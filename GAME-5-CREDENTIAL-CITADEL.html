];

// Returns the next sub-level identifier within a world, or null if world is done
function _nextLevelInWorld(world, level){
  const seq=world===1?[1,2,3,4,'C']:[1,2,3,'C'];
  const idx=seq.indexOf(level);
  return(idx>=0&&idx<seq.length-1)?seq[idx+1]:null;
}

function drawLevelSelect(){
  const W=800,H=480;
  cls();

  // Background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#06101f');bg.addColorStop(1,'#020812');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Subtle grid lines
  ctx.strokeStyle='rgba(34,211,238,0.04)';ctx.lineWidth=1;
  for(let gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(let gy=0;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

  // Header
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=C.CYAN;ctx.font='bold 13px Inter';
  ctx.fillText('CREDENTIAL CITADEL',W/2,16);
  ctx.fillStyle=C.WHITE;ctx.font='bold 26px Inter';
  ctx.fillText('SELECT WORLD',W/2,40);
  ctx.fillStyle='rgba(34,211,238,0.3)';ctx.fillRect(80,56,W-160,1);

  const selW=STATE.levelSelectWorld||1;
  // 5 cards: evenly spaced
  const CARD_W=130,CARD_H=310,CARD_GAP=12;
  const TOTAL_W=5*CARD_W+4*CARD_GAP;
  const START_X=(W-TOTAL_W)/2;
  const CARDS_Y=64;

  _WS_WORLDS.forEach((wdata,i)=>{
    const wi=i+1;
    const cx=START_X+i*(CARD_W+CARD_GAP);
    const cy=CARDS_Y;
    const sel=wi===selW;
    const unlocked=STATE.worldsUnlocked[i];
    const done=STATE.worldsUnlocked[i+1]||STATE.worldsUnlocked[wi]&&(STATE.levelProgress[wi]||0)>=_WS_LEVELS[i].length;

    // Card base
    let cbg=done?'#072418':unlocked?'#080f1e':'#030608';
    if(sel&&unlocked)cbg=done?'#0d3324':'#0c1f3c';
    rrFill(cx,cy,CARD_W,CARD_H,14,cbg);

    // Card border
    if(sel&&unlocked){
      ctx.save();
      ctx.shadowColor=C.AMBER;ctx.shadowBlur=22;
      ctx.strokeStyle=C.AMBER;ctx.lineWidth=2.5;
      roundRect(cx,cy,CARD_W,CARD_H,14);ctx.stroke();
      ctx.restore();
      // Amber top accent bar
      ctx.fillStyle=C.AMBER;
      ctx.beginPath();ctx.roundRect(cx+4,cy,CARD_W-8,4,2);ctx.fill();
    } else {
      ctx.strokeStyle=done?C.EMERALD:unlocked?'#1a3a5a':'#0d1520';
      ctx.lineWidth=1.5;roundRect(cx,cy,CARD_W,CARD_H,14);ctx.stroke();
    }

    const MID=cx+CARD_W/2;

    if(!unlocked){
      // LOCKED card
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(34,211,238,0.18)';ctx.font='40px serif';
      ctx.fillText('🔒',MID,cy+CARD_H/2-20);
      ctx.fillStyle='#2a3a52';ctx.font='bold 13px Inter';
      ctx.fillText('WORLD '+wi,MID,cy+CARD_H/2+20);
      ctx.fillStyle='#1a2a3c';ctx.font='11px Inter';
      ctx.fillText('Complete world '+(wi-1),MID,cy+CARD_H/2+38);
      ctx.fillText('to unlock',MID,cy+CARD_H/2+52);
      return;
    }

    // ── UNLOCKED card ────────────────────────────────────────
    // World number badge
    ctx.textAlign='center';ctx.textBaseline='middle';
    const numCol=done?C.EMERALD:sel?C.AMBER:C.CYAN;
    ctx.fillStyle=sel?'rgba(251,191,36,0.12)':'rgba(34,211,238,0.09)';
    rrFill(cx+CARD_W/2-18,cy+12,36,36,8,sel?'rgba(251,191,36,0.12)':'rgba(34,211,238,0.09)');
    ctx.fillStyle=numCol;ctx.font='bold 22px Inter';
    ctx.fillText(wi,MID,cy+30);

    // Icon
    ctx.font='26px serif';
    ctx.fillText(wdata.icon,MID,cy+72);

    // World name — two lines if needed
    ctx.fillStyle=done?C.EMERALD:sel?C.WHITE:'#8bafd0';
    ctx.font='bold 13px Inter';
    const words=wdata.n.split(' ');let line1='',line2='',split=false;
    for(const w of words){
      if(!split&&ctx.measureText((line1?line1+' ':'')+w).width<CARD_W-16){line1=(line1?line1+' ':'')+w;}
      else{split=true;line2=(line2?line2+' ':'')+w;}
    }
    ctx.fillText(line1,MID,cy+100);
    if(line2){ctx.fillStyle=done?C.EMERALD:sel?C.WHITE:'#6a8aaa';ctx.font='bold 13px Inter';ctx.fillText(line2,MID,cy+118);}

    // Subtitle
    ctx.fillStyle=done?'rgba(16,185,129,0.55)':sel?'rgba(34,211,238,0.55)':'rgba(100,130,160,0.55)';
    ctx.font='10px Inter';
    // Wrap subtitle
    const sw=wdata.sub.split(' ');let sl='';let sly=cy+(line2?136:130);
    for(const sw2 of sw){
      const st=sl?sl+' '+sw2:sw2;
      if(ctx.measureText(st).width>CARD_W-12){if(sl)ctx.fillText(sl,MID,sly);sly+=14;sl=sw2;}else sl=st;
    }
    if(sl)ctx.fillText(sl,MID,sly);

    // Progress bar
    const nSubs=_WS_LEVELS[i].length;
    const prog=done?nSubs:STATE.levelProgress[wi]||0;
    const barY=cy+CARD_H-72;const barW=CARD_W-24;const barX=cx+12;
    ctx.fillStyle='rgba(34,211,238,0.08)';rrFill(barX,barY,barW,6,3,'rgba(34,211,238,0.08)');
    const fillPct=Math.min(1,prog/nSubs);
    if(fillPct>0){
      const fc=done?C.EMERALD:C.CYAN;
      rrFill(barX,barY,Math.max(6,barW*fillPct),6,3,fc);
    }
    ctx.fillStyle=done?C.EMERALD:sel?C.CYAN:'#4a6080';ctx.font='10px Inter';ctx.textBaseline='bottom';
    ctx.fillText(prog+'/'+nSubs+' stages',MID,barY-2);

    // CTA bottom
    ctx.textBaseline='bottom';
    if(done){
      ctx.fillStyle=C.EMERALD;ctx.font='bold 14px Inter';
      ctx.fillText('✓  COMPLETE',MID,cy+CARD_H-10);
    } else if(sel){
      const p=0.72+0.28*Math.sin(STATE.frame*0.09);
      ctx.fillStyle=`rgba(251,191,36,${p})`;ctx.font='bold 15px Inter';
      ctx.fillText('▶  PLAY',MID,cy+CARD_H-10);
    } else {
      ctx.fillStyle='#2a4060';ctx.font='12px Inter';
      ctx.fillText('available',MID,cy+CARD_H-10);
    }
  });

  // Nav hint
  ctx.fillStyle='rgba(6,14,28,0.95)';ctx.fillRect(0,H-22,W,22);
  ctx.fillStyle='rgba(34,211,238,0.15)';ctx.fillRect(0,H-22,W,1);
  ctx.fillStyle='#4a6080';ctx.font='12px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('← →  choose world   ·   SPACE / ENTER  play   ·   ESC  back',W/2,H-11);
}

  cls();
  const pulse=1+0.05*Math.sin(STATE.frame*0.07);
  ctx.save();ctx.translate(800/2,110);ctx.scale(pulse,pulse);
  ctx.fillStyle=C.AMBER;ctx.font='bold 30px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('CREDENTIALS SECURED!',0,0);ctx.restore();
  ctx.fillStyle=C.CYAN;ctx.font='18px Inter';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Master Breach-Broker Defeated',800/2,168);
  ctx.fillStyle=C.WHITE;ctx.font='13px Inter';
  ['✓ Use unique passwords for every site','✓ Enable MFA (hardware key is most secure)','✓ Use a password manager','✓ Apply least-privilege access','✓ Keep recovery codes offline']
    .forEach((l,i)=>ctx.fillText(l,800/2,220+i*28));
  ctx.fillStyle=C.AMBER;ctx.font='bold 14px Inter';
  ctx.fillText(`Final Quizzes correct: ${STATE.quizzesEngaged}`,800/2,380);
  if(Math.floor(STATE.frame/40)%2===0){
    ctx.fillStyle=C.SLATE;ctx.font='11px Inter';ctx.fillText('SPACE to play again',800/2,418);}
}

// ─── CLICK HANDLER ────────────────────────────────────────────────────────────
canvas.addEventListener('click',ev=>{
  // Intel overlay Continue button
  if(STATE.intelOverlay){
    const cr=STATE._intelContinueRect;
    const rect2=canvas.getBoundingClientRect();
    const mx2=(ev.clientX-rect2.left)*(800/rect2.width);
    const my2=(ev.clientY-rect2.top)*(480/rect2.height);
    if(cr&&mx2>=cr.x&&mx2<=cr.x+cr.w&&my2>=cr.y&&my2<=cr.y+cr.h){
      STATE.intelOverlay=null;STATE._intelContinueRect=null;
    }
    return; // block all other clicks while intel showing
  }
  // Level complete continue button
  if(STATE.screen==='levelcomplete'){STATE._lcContinue=true;return;}
  // Dismiss castle entry tip first (before any other click handling)
  if(STATE.entryTipActive){STATE.entryTipActive=false;return;}
  // Title/gameover/levelcomplete — click to advance
  if(STATE.screen==='title'){Audio.init();BGM.setMuted(Audio.isMuted());STATE.levelSelectWorld=1;STATE.screen='levelselect';return;}
  const rect=canvas.getBoundingClientRect();
  const mx=(ev.clientX-rect.left)*(800/rect.width);
  const my=(ev.clientY-rect.top)*(480/rect.height);

  if(STATE.screen==='quiz'&&STATE.quizActive){
    const q=STATE.quizActive,qd=q.quiz;
    if(q.answered&&STATE._quizContinueRect){
      const r=STATE._quizContinueRect;
      if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){dismissQuiz();return;}
    }
    if(!q.answered){
      // Click on options
      ctx.font='bold 15px Inter';
      const lines=wrapText(qd.q,700-50);
      const optY=55+32+lines.length*20+14;
      qd.opts.forEach((_,i)=>{
        const by=optY+i*56;
        if(mx>=50+20&&mx<=50+700-20&&my>=by&&my<=by+46)handleQuizAnswer(i);
      });
    }
  }
});

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function gameUpdate(){ if(STATE.intelOverlay){if(Keys.pressed('Space')||Keys.pressed('Enter')){STATE.intelOverlay=null;STATE._intelContinueRect=null;Keys.flush();}return;}
  STATE.frame++;
  const scr=STATE.screen;

  if(scr==='title'){
    if(Keys.pressed('Space')||Keys.pressed('Enter')){Audio.init();BGM.setMuted(Audio.isMuted());STATE.levelSelectWorld=1;STATE.screen='levelselect';} // P1-4: Enter also starts game
  } else if(scr==='levelselect'||scr==='worldselect'){
    if(scr==='worldselect')STATE.screen='levelselect';
    const _lsw=STATE.levelSelectWorld||1;
    // Left/Right navigates worlds
    if(Keys.pressed('ArrowLeft')||Keys.pressed('ArrowUp')){
      const nw=Math.max(1,_lsw-1);
      STATE.levelSelectWorld=nw;
    }
    if(Keys.pressed('ArrowRight')||Keys.pressed('ArrowDown')){
      const nw=Math.min(5,_lsw+1);
      STATE.levelSelectWorld=nw;
    }
    if(Keys.pressed('Escape')){STATE.screen='title';}
    if(Keys.pressed('Space')||Keys.pressed('Enter')){
      const unlocked=STATE.worldsUnlocked[_lsw-1];
      if(!unlocked){showMsg('Complete world '+(_lsw-1)+' first!',C.RED,150);}
      else{
        // Always start world from sub-level 1
        STATE.world=_lsw;STATE.level=1;
        STATE.lives=3;STATE.score=0;STATE.coins=0;STATE.powerup=0;
        loadLevel(STATE.world,STATE.level);
        emitEvent('session.started',{world:STATE.world});
      }
    }
  } else if(scr==='game'){
    const lv=STATE.currentLevel;
    updateTraining();
    // Intel overlay dismiss on Space
    if(STATE.intelOverlay&&(Keys.pressed('Space')||Keys.pressed('Enter'))){STATE.intelOverlay=null;STATE._intelContinueRect=null;return;}
    // Castle entry tip dismiss — Space/Enter clears it before normal input
    if(STATE.entryTipActive&&(Keys.pressed('Space')||Keys.pressed('Enter'))){STATE.entryTipActive=false;}
    if(Keys.pressed('Escape')){STATE.screen='pause';STATE.pauseSelectedItem=0;}
    if(Keys.pressed('KeyM'))Audio.toggle();
    if(Keys.pressed('KeyR')){STATE.lives=3;STATE.powerup=0;BGM.stop();loadLevel(STATE.world,STATE.level);}
    updatePlayer(lv);
    updateEntities(lv);

  } else if(scr==='boxanim'){
    // Box flash/pause animation playing — world is FROZEN (enemies can't move/damage)
    // Only the box animation and particles update; player is safe
    const lv=STATE.currentLevel;
    for(const e of entities) if(e.type==='box') updateBox(e,lv);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
      if(p.life<=0)particles.splice(i,1);
    }

  } else if(scr==='quiz'){
    const q=STATE.quizActive;
    if(!q){STATE.screen='game';return;}
    for(let i=0;i<4;i++)if(Keys.pressed(`Digit${i+1}`))handleQuizAnswer(i);
    // P2-6: Esc dismisses at any time (leave quiz, box respawns so player can retry)
    if(Keys.pressed('Escape')){dismissQuiz();}
    else if(q.answered&&(Keys.pressed('Space')||Keys.pressed('Enter')))dismissQuiz();
    // P2-6: R restarts the level from quiz screen
    if(Keys.pressed('KeyR')){STATE.powerup=0;BGM.stop();loadLevel(STATE.world,STATE.level);}
    // No timer — quiz stays open until the player answers (better for learning, per spec)
    if(q.wrongAnim>0)q.wrongAnim--;
  } else if(scr==='pause'){
    if(Keys.pressed('Escape'))STATE.screen='game';
    if(Keys.pressed('KeyR')){STATE.lives=3;STATE.powerup=0;BGM.stop();loadLevel(STATE.world,STATE.level);}
    if(Keys.pressed('ArrowUp'))STATE.pauseSelectedItem=Math.max(0,STATE.pauseSelectedItem-1);
    if(Keys.pressed('ArrowDown'))STATE.pauseSelectedItem=Math.min(3,STATE.pauseSelectedItem+1);
    if(Keys.pressed('Space')||Keys.pressed('Enter')){
      if(STATE.pauseSelectedItem===0){STATE.screen='game';}
      else if(STATE.pauseSelectedItem===1){STATE.powerup=0;loadLevel(STATE.world,STATE.level);}
      else if(STATE.pauseSelectedItem===2){Audio.toggle();}
      else if(STATE.pauseSelectedItem===3){BGM.stop();STATE.screen='worldselect';}
    }
  } else if(scr==='levelcomplete'){
    if((Keys.pressed('Space')||Keys.pressed('Enter')||STATE._lcContinue)&&STATE.screen==='levelcomplete'){
      STATE._lcContinue=false;
      const lv=STATE.currentLevel;
      // Record progress
      const _nSubLevels=_WS_LEVELS[STATE.world-1]?_WS_LEVELS[STATE.world-1].length:4;
      const _wp=STATE.levelProgress[STATE.world]||0;
      const _progVal=lv.level==='C'?_nSubLevels:lv.level;
      if(_progVal>_wp)STATE.levelProgress[STATE.world]=_progVal;
      // Check if there is a next sub-level in this world
      const nextLv=_nextLevelInWorld(STATE.world,STATE.level);
      if(nextLv!==null){
        // More sub-levels in this world — auto-advance silently
        STATE.level=nextLv;
        loadLevel(STATE.world,STATE.level);
      } else {
        // World complete — unlock next world
        STATE.worldsUnlocked[STATE.world]=true;
        if(STATE.world>=5){
          STATE.screen='victory';emitEvent('session.completed',{score:STATE.score});
        } else {
          BGM.stop();
          STATE.world++;
          STATE.levelSelectWorld=STATE.world;
          STATE.screen='levelselect';
        }
      }
    }
  } else if(scr==='gameover'){
    if(Keys.pressed('KeyR')){
      // P2-3: respawn from last checkpoint with reset lives, not full level reload
      STATE.lives=3;STATE.powerup=0;
      if(player&&player.lastCheckpoint){
        respawnPlayer(STATE.currentLevel);
      } else {
        BGM.stop();loadLevel(STATE.world,STATE.level);
      }
    }
    if(Keys.pressed('Escape')){BGM.stop();STATE.levelSelectWorld=STATE.world;STATE.screen='levelselect';}
  } else if(scr==='bossvictory'){
    const bv=STATE.bossVictory;
    if(bv){
      bv.timer--;
      if(bv.timer<=0||Keys.pressed('Space')||Keys.pressed('Enter')){
        STATE.bossVictory=null;
        STATE.screen='levelcomplete';
        const _bla=bv.quizCorrect;const _blt=bv.quizTotal;
        const _blp=_blt>0?Math.round(_bla/_blt*100):100;
        announce('Level complete. '+_blp+'% — '+_bla+' of '+_blt+' questions correct on first try.');
      }
    }
  } else if(scr==='victory'){
    if(Keys.pressed('Space')){
      STATE.world=1;STATE.level=1;STATE.lives=3;STATE.score=0;STATE.coins=0;STATE.powerup=0;
      BGM.stop();STATE.screen='worldselect';
      emitEvent('session.started',{world:1,restart:true});
    }
  }

  Keys.flush();
}

function gameDraw(){
  const scr=STATE.screen;
  if(scr==='title'){drawTitle();return;}
  if(scr==='levelselect'){drawLevelSelect();return;}
  if(scr==='worldselect'){drawWorldSelect();return;}
  if(scr==='gameover'){drawGameOver();return;}
  if(scr==='victory'){drawVictory();return;}

  // In-game screens
  if(STATE.currentLevel){
    const lv=STATE.currentLevel;
    cls();
    drawParallax();
    drawLevelBackground(lv);
    drawLevel(lv);
    drawEntities(lv);
    drawPlayer();
    drawParticles();
    drawCoachmark();
    drawFloatTexts();
    drawHUD();
    // ticker now in controls-strip div below canvas
    drawMissionCard();
    drawEnemyTooltips();
    drawPowerupCard();
    drawIQFlash();
    drawScrollOverlay();
    if(STATE.tr.intelPanel)drawIntelPanel();
    if(STATE.tr.bossRevealTimer>0)drawBossReveal();
    drawIntelFlash();
    if(STATE.intelOverlay)drawIntelOverlay();
    if(STATE.entryTipActive)drawEntryTip();
    if(scr==='quiz')drawQuizOverlay();
    if(scr==='boxanim'){
      // Subtle dim during box animation to focus attention on box
      ctx.fillStyle='rgba(2,6,23,0.25)';ctx.fillRect(0,0,800,480);
    }
    if(scr==='pause')drawPauseMenu();
    if(scr==='levelcomplete')drawLevelComplete();
    if(scr==='bossvictory')drawBossVictory();
  } else {
    cls();
  }
}

function loop(){
  gameUpdate();
  gameDraw();
  requestAnimationFrame(loop);
}

// ── Full-screen canvas scaling ────────────────────────────────────────────────
function scaleCanvas(){
  const banner=document.getElementById('staging-banner');
  const controls=document.getElementById('controls-strip');
  const bh=banner?banner.offsetHeight:22;
  const ch=controls?controls.offsetHeight:22;
  const availW=window.innerWidth;
  const availH=window.innerHeight-bh-ch;
  const scale=Math.min(availW/800,availH/480);
  const sw=Math.floor(800*scale);
  const sh=Math.floor(480*scale);
  const c=document.getElementById('gameCanvas');
  c.style.width=sw+'px';c.style.height=sh+'px';
  const wrapper=document.getElementById('game-wrapper');
  if(wrapper){wrapper.style.width=sw+'px';}
  if(controls)controls.style.width=sw+'px';
}
scaleCanvas();
window.addEventListener('resize',scaleCanvas);

// Boot
requestAnimationFrame(loop);
document.getElementById('gameCanvas').focus();

// ── DOM Ticker (below canvas, not on canvas) ──────────────────────────────
(function(){
  const strip = document.getElementById('controls-strip');
  if(!strip) return;
  const facts = [
    '81% of data breaches involve weak or stolen passwords — Verizon DBIR 2023',
    '6-character passwords fall in under 7 minutes on consumer hardware',
    'Average person reuses the same password across 14 different sites',
    'SIM swap attacks intercepted 68M in crypto in 2023 alone',
    'Hardware security keys block 100% of phishing attacks — Google internal study',
    'The 2021 RockYou2021 leak exposed 8.4 billion plain-text passwords',
    'Zero Trust: never trust, always verify — regardless of network location',
    'Just-in-Time access reduces credential exposure by up to 90%',
    'Password managers eliminate credential stuffing risk entirely'
  ];
  let idx = 0;
  const baseText = '← → walk · hold to run · Space/↑ jump · Z fireball · 1/2/3/4 quiz · M mute · Esc pause · R retry';
  strip.textContent = baseText;
  setInterval(()=>{
    strip.textContent = '📡 THREAT INTEL: ' + facts[idx % facts.length];
    idx++;
    setTimeout(()=>{ strip.textContent = baseText; }, 4000);
  }, 9000);
})();
</script>
