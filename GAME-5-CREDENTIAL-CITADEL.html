// ─── AUDIO SFX ───────────────────────────────────────────────────────────────
const Audio = (()=>{
  let ac=null, muted=false;
  function init(){
    if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
    if(ac.state==='suspended') ac.resume();
  }
  function tone(freq,type='sine',vol=0.3,dur=0.1,delay=0){
    if(muted||!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }
  function chord(freqs,type='sine',vol=0.18,dur=0.15){
    freqs.forEach((f,i)=>tone(f,type,vol,dur,i*0.05));
  }
  return{
    init, get ctx(){return ac;},
    toggle(){muted=!muted;BGM.setMuted(muted);return muted;},
    isMuted(){return muted;},
    jump(hold){init();tone(hold?440:330,'square',0.18,0.12);if(hold)tone(550,'square',0.08,0.08,0.06);},
    coin(){init();tone(880,'sine',0.25,0.08);tone(1320,'sine',0.18,0.06,0.05);},
    stomp(){init();tone(150,'square',0.35,0.1);tone(80,'square',0.25,0.05,0.05);},
    hit(){init();tone(220,'sawtooth',0.35,0.15);tone(110,'sawtooth',0.25,0.1,0.08);},
    powerup(tier){
      init();
      const seqs=[[523,659,784,1047],[784,1047,1319],[1047,1319,1568],[659,784,1047,1319],[523,659,784,1047,1319]];
      chord(seqs[Math.min(tier,4)],'sine',0.22,0.12);
    },
    quizCorrect(){init();chord([523,659,784,1047],'sine',0.18,0.15);},
    quizWrong(){init();tone(330,'sawtooth',0.28,0.1);tone(220,'sawtooth',0.22,0.1,0.1);tone(165,'sawtooth',0.18,0.15,0.2);},
    bossHit(){init();tone(110,'sawtooth',0.45,0.25);tone(87,'sawtooth',0.35,0.25,0.12);},
    levelComplete(){init();chord([523,659,784,1047,1319],'sine',0.18,0.2);tone(1568,'sine',0.25,0.4,0.3);},
    enemyFire(){init();tone(600,'sawtooth',0.18,0.06);tone(400,'sawtooth',0.12,0.04,0.04);}
  };
})();

// ─── BACKGROUND MUSIC ────────────────────────────────────────────────────────
const BGM = (()=>{
  let ac=null, masterGain=null, playing=false, theme=null;
  let stepIdx=0, nextTime=0, schedTimer=null, muted=false;

  const THEMES = {
    plains:{bpm:140,vol:0.055,
      notes:[523,659,784,659,523,392,440,523,587,523,440,392],
      dur:  [0.25,0.25,0.5,0.25,0.25,0.5,0.25,0.5,0.25,0.25,0.25,0.5]},
    cave:{bpm:108,vol:0.045,
      notes:[392,370,349,330,349,392,392,392,330,294],
      dur:  [0.5,0.25,0.25,0.5,0.5,0.25,0.25,0.5,0.5,1.0]},
    water:{bpm:116,vol:0.05,
      notes:[523,587,659,698,784,698,659,587,523,494,523,587],
      dur:  [0.25,0.25,0.25,0.25,0.5,0.25,0.25,0.5,0.25,0.25,0.25,0.5]},
    castle:{bpm:96,vol:0.055,
      notes:[220,233,220,196,220,196,175,165,175,196,220,246],
      dur:  [0.5,0.25,0.25,0.5,0.25,0.25,0.5,0.5,0.25,0.25,0.5,1.0]},
    boss:{bpm:128,vol:0.06,
      notes:[330,349,330,311,330,311,294,277,294,311,330,370],
      dur:  [0.25,0.25,0.5,0.25,0.25,0.5,0.25,0.5,0.25,0.25,0.5,0.5]}
  };

  function ensure(){
    if(!Audio.ctx) Audio.init();
    ac = Audio.ctx;
    if(!masterGain){
      masterGain=ac.createGain();
      masterGain.gain.value=0;
      masterGain.connect(ac.destination);
    }
  }

  function scheduleNote(freq,time,dur,vol){
    if(!ac||muted)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(masterGain);
    o.type='triangle';
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol,time);
    g.gain.exponentialRampToValueAtTime(0.0001,time+dur*0.85);
    o.start(time);o.stop(time+dur);
  }

  function tick(){
    if(!playing||!theme||!ac)return;
    const AHEAD=0.12;
    const t=THEMES[theme];
    const beatDur=60/t.bpm;
    while(nextTime < ac.currentTime+AHEAD){
      const idx=stepIdx%t.notes.length;
      const dur=beatDur*t.dur[idx];
      scheduleNote(t.notes[idx],nextTime,dur,t.vol);
      // Bass note every 4 steps
      if(idx%4===0) scheduleNote(t.notes[idx]/2,nextTime,dur*0.8,t.vol*0.5);
      nextTime+=dur;
      stepIdx++;
    }
    schedTimer=setTimeout(tick,50);
  }

  return{
    start(themeName){
      if(playing&&theme===themeName)return;
      this.stop();
      ensure();
      theme=themeName||'plains';
      playing=true;stepIdx=0;
      nextTime=ac.currentTime+0.15;
      masterGain.gain.cancelScheduledValues(ac.currentTime);
      masterGain.gain.setValueAtTime(muted?0:1,ac.currentTime);
      tick();
    },
    stop(){
      playing=false;theme=null;
      if(schedTimer){clearTimeout(schedTimer);schedTimer=null;}
    },
    setMuted(m){
      muted=m;
      if(masterGain&&ac){
        masterGain.gain.cancelScheduledValues(ac.currentTime);
        masterGain.gain.setValueAtTime(m?0:1,ac.currentTime);
      }
    }
  };
})();

const Keys={
  held:new Set(),just:new Set(),just_up:new Set(),
  down(e){
    const k=e.code;
    if(!Keys.held.has(k))Keys.just.add(k);
    Keys.held.add(k);
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k))e.preventDefault();
  },
  up(e){Keys.held.delete(e.code);Keys.just_up.add(e.code);},
  flush(){Keys.just.clear();Keys.just_up.clear();},
  is(k){return Keys.held.has(k);},
  pressed(k){return Keys.just.has(k);},
};
window.addEventListener('keydown',Keys.down,{passive:false});
window.addEventListener('keyup',Keys.up);

// ─── TILE HELPERS ─────────────────────────────────────────────────────────────
// 0=air 1=ground 2=platform 3=brick 4=mystery-box(entity) 5=pipe-body 6=pipe-top 7=water 8=castle-wall 9=lava
function makeTileGrid(rows,cols){return Array.from({length:rows},()=>new Uint8Array(cols));}
function isSolid(t){return t===1||t===2||t===3||t===4||t===8;}
// isWallSolid excludes mystery-box tile-4 so enemies don't get blocked horizontally by boxes
function isWallSolid(t){return t===1||t===2||t===3||t===8;}
function isLethal(t){return t===9;}
function isWater(t){return t===7;}

// ─── LEVEL BUILDERS ──────────────────────────────────────────────────────────
function buildLevel1_1(){
  const W=160,H=15;
  const tiles=makeTileGrid(H,W);
  for(let x=0;x<W;x++){tiles[H-1][x]=1;}
  // Platforms
  for(let x=18;x<=22;x++)tiles[10][x]=2;
  for(let x=35;x<=40;x++)tiles[9][x]=2;
  for(let x=55;x<=60;x++)tiles[8][x]=2;
  // Hidden alcove (rows 10-12, cols 68-74)
  for(let x=68;x<=74;x++)tiles[10][x]=2;
  tiles[11][68]=3;tiles[11][74]=3;
  // Pipes

// ─── LEVEL LOADING ────────────────────────────────────────────────────────────
function loadLevel(world,level){
  const lv=getLevel(world,level);
  STATE.currentLevel=lv;
  entities=[];particles=[];
  camera={x:0};
  STATE.flagClimbing=false;
  STATE.flagClimbTimer=0;
  // Reset powerup each level — player must earn it again (user request)
  STATE.powerup=0;
  STATE.starTimer=0;
  // Quiz progress gate: count how many quiz boxes are in this level
  STATE.quizzesRequired=lv.boxes.filter(b=>b.quiz&&QUIZZES[b.quiz]).length;
  STATE.quizzesPassed=0;
  // Castle entry tip — show on every (re-)enter
  STATE.entryTipActive=!!lv.hasBoss;
  // Training system reset
  const tr=STATE.tr;
  tr.missionTimer=180;  // 3 seconds auto-dismiss
  tr.iqFlash=null;tr.powerupCard=null;tr.floatTexts=[];
  tr.bossRevealTimer=0;tr.scrollOverlay=null;tr.intelPanel=null;
  tr.deathCause='unknown';tr.tickerPos=802;tr.tickerIdx=0;
  tr.seenEnemies=new Set();tr.enemyTooltips=[];tr.scrollEntities=[];
  // Spawn scroll collectibles from level training data
  if(TR.scrolls[lv.id]){
    for(const s of TR.scrolls[lv.id]){
      tr.scrollEntities.push({x:s.tx*T+4,y:s.ty*T+4,w:24,h:24,fact:s.fact,collected:false,bobPhase:0});
    }
  }
  STATE.entryTipText=lv.hasBoss?'BOSS LEVEL: The Reuser awaits!\nCollect 🔥 Fire Flower boxes on the way.\nFireballs deal DOUBLE damage to the boss.':'';

  player=makePlayer(lv.spawn.tx,lv.spawn.ty);
  player.lastCheckpoint={x:player.x,y:player.y}; // use corrected position

  // Ensure all mystery-box positions are stamped as solid tile-4 (scaffold levels stamp here)
  for(const b of lv.boxes) lv.tiles[b.ty][b.tx]=4;

  for(const e of lv.enemies) entities.push(makeEnemy(e.type,e.tx,e.ty));
  for(const b of lv.boxes)   entities.push(makeMysteryBox(b.tx,b.ty,b.quiz,b.reward));
  for(const c of lv.coins)   entities.push(makeCoin(c.tx,c.ty,c.underwater));
  if(lv.flagpole) entities.push({type:'flagpole',x:lv.flagpole.tx*T,y:0,w:T,h:lv.h*T});
  if(lv.hasBoss){
    const b=lv.bossSpawn;
    entities.push(makeBoss(b.tx*T,b.ty*T));
  }
  coachmark=lv.coachmark?{...lv.coachmark,visible:true,dismissed:false}:null;

  STATE.screen='game';
  BGM.start(lv.music||'plains');
  emitEvent('wave.started',{world,level});
}

// ─── COLLISION HELPERS ───────────────────────────────────────────────────────
function getTile(lv,tx,ty){
  if(tx<0||ty<0||tx>=lv.w||ty>=lv.h) return(ty>=lv.h)?0:1;
  return lv.tiles[ty][tx];
}

function rectRect(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// FIX: resolveY — removed overly-strict velocity condition that caused fall-through
function resolveY(ent,lv){
  const margin=1;
  const left=Math.floor((ent.x+margin)/T);
  const right=Math.floor((ent.x+ent.w-margin-1)/T);

  if(ent.vy>=0){
    // Single-row foot check only — using >= catches exact-tile-edge landings.
    // IMPORTANT: The old ty2 secondary check (floor-1/T) caused entities on a platform
    // to evaluate the row ABOVE and snap into mystery-box tiles. Removed entirely.
    const ty1=Math.floor((ent.y+ent.h)/T);
    for(const tx of[left,right]){
      const tile=getTile(lv,tx,ty1);
      if(isSolid(tile)&&ent.y+ent.h>=ty1*T){   // >= catches exact boundary
        ent.y=ty1*T-ent.h;
        return'floor';
      }
    }
  } else {
    // Rising: check head row
    const ty=Math.floor(ent.y/T);
    for(const tx of[left,right]){
      const tile=getTile(lv,tx,ty);
      if(isSolid(tile)&&ent.y<(ty+1)*T){
        ent.y=(ty+1)*T;
        // Mystery box bump — store tile coord for checkBoxBump() this frame
        if(tile===4) STATE._boxBump={tx,ty};
        return'ceil';
      }
    }
  }
  return null;
}

function resolveX(ent,lv){
  const margin=1;
  const left=Math.floor((ent.x+margin)/T);
  const right=Math.floor((ent.x+ent.w-margin-1)/T);
  const top=Math.floor((ent.y+margin)/T);
  const bot=Math.floor((ent.y+ent.h-1)/T);
  let hit=false;
  for(let ty=top;ty<=bot;ty++){
    for(const tx of[left,right]){
      if(isWallSolid(getTile(lv,tx,ty))){  // isWallSolid: enemies walk through box columns
        if(ent.vx>0)ent.x=tx*T-ent.w;
        else if(ent.vx<0)ent.x=(tx+1)*T;
        hit=true;
      }
    }
  }
  return hit;
}

function moveEntity(ent,lv){
  const dx=ent.vx/MOVE_STEPS;
  for(let s=0;s<MOVE_STEPS;s++){
    ent.x+=dx;
    if(resolveX(ent,lv)){ent.vx=0;break;}
  }
  ent.onGround=false;
  const dy=ent.vy/MOVE_STEPS;
  for(let s=0;s<MOVE_STEPS;s++){
    ent.y+=dy;
    const hit=resolveY(ent,lv);
    if(hit==='floor'){ent.vy=0;ent.onGround=true;break;}
    if(hit==='ceil'){ent.vy=Math.max(ent.vy,0);break;}
  }
}

function isInWater(ent,lv){
  return isWater(getTile(lv,Math.floor((ent.x+ent.w/2)/T),Math.floor((ent.y+ent.h/2)/T)));
}

// ─── PLAYER UPDATE ────────────────────────────────────────────────────────────
function updatePlayer(lv){
  if(!player||player.dead){
    if(player&&player.dead){
      player.deathTimer--;
      player.vy+=GRAVITY;
      player.y+=player.vy;
      if(player.deathTimer<=0)respawnPlayer(lv);
    }
    return;
  }
  const p=player;

  // ── Flagpole slide-down phase ──────────────────────────────────────────────
  if(STATE.flagClimbing){
    p.vx=0; p.vy=0;
    p.x=STATE.flagpoleLockedX; p.facing=1;
    p.y+=4; // slide at 4px/frame
    if(p.y>=STATE.flagpoleBottomY){
      p.y=STATE.flagpoleBottomY;
      STATE.flagClimbing=false;
      STATE.flagClimbTimer=80; // walk-off frames before level-complete
    }
    const tc=p.x-200;camera.x=Math.max(0,Math.min(tc,(lv.w-26)*T));
    p.animTimer++;if(p.animTimer>8){p.animTimer=0;p.animFrame=(p.animFrame+1)%4;}
    return;
  }

  // ── Walk-off phase (after pole bottom) ────────────────────────────────────
  if(STATE.flagClimbTimer>0){
    STATE.flagClimbTimer--;
    p.facing=1; p.vx=0;
    p.x+=2; // walk right
    p.vy+=GRAVITY; p.vy=Math.min(p.vy,14);
    moveEntity(p,lv);
    const tc=p.x-200;camera.x=Math.max(0,Math.min(tc,(lv.w-26)*T));
    p.animTimer++;if(p.animTimer>8){p.animTimer=0;p.animFrame=(p.animFrame+1)%4;}
    if(STATE.flagClimbTimer===0){STATE.screen='levelcomplete';}
    return;
  }

  const left=Keys.is('ArrowLeft'),right=Keys.is('ArrowRight');
  const jumpHeld=Keys.is('Space')||Keys.is('ArrowUp');
  const jumpPressed=Keys.pressed('Space')||Keys.pressed('ArrowUp');

  // Run timer
  if(left||right)p.runTimer=Math.min(p.runTimer+1,20);else p.runTimer=0;
  const running=p.runTimer>18;
  const maxSpd=running?RUN_SPEED:MAX_SPEED;

  // Horizontal
  if(left){p.vx-=ACCEL;p.facing=-1;}
  else if(right){p.vx+=ACCEL;p.facing=1;}
  else{p.vx*=FRICTION;if(Math.abs(p.vx)<0.1)p.vx=0;}
  p.vx=Math.max(-maxSpd,Math.min(maxSpd,p.vx));

  // Jump
  if(jumpPressed&&p.onGround){
    p.vy=JUMP_VY;
    p.jumpBoostFrames=BOOST_FRAMES;
    Audio.jump(jumpHeld);
  }
  if(p.jumpBoostFrames>0&&jumpHeld&&p.vy<0){
    p.vy+=BOOST_PER_F;
    p.jumpBoostFrames--;
  } else if(!jumpHeld){
    p.jumpBoostFrames=0;
  }
  // Cape glide
  if(STATE.powerup===3&&!p.onGround&&jumpHeld&&p.vy>0)p.vy=Math.min(p.vy,1.5);

  // Gravity
  p.vy+=GRAVITY;
  p.vy=Math.min(p.vy,14);

  moveEntity(p,lv);

  // Pit/lava death — instant kill bypasses powerup cushion (no "taking damage in lava")
  const cx=Math.floor((p.x+p.w/2)/T),cy=Math.floor((p.y+p.h-1)/T);
  if(isLethal(getTile(lv,cx,cy))||p.y>lv.h*T+80){killInstant(lv);return;}

  // Water
  if(isInWater(p,lv)){p.vx*=0.85;p.vy*=0.88;if(p.vy>2)p.vy=2;}

  // FIX: Bi-directional camera (no left-lock) so players can backtrack to quiz boxes
  const targetCam=p.x-200;
  camera.x=Math.max(0,Math.min(targetCam,(lv.w-26)*T));

  if(p.invuln>0)p.invuln--;
  if(STATE.starTimer>0){STATE.starTimer--;if(STATE.starTimer===0)STATE.powerup=Math.max(0,STATE.powerup-1);}

  // Fireball — V3 approach: held key with cooldown (Keys.pressed missed frames in some states)
  if(p.fireballCooldown>0)p.fireballCooldown--;
  if((Keys.is('KeyZ')||Keys.pressed('KeyZ'))&&STATE.powerup>=2&&p.fireballCooldown===0){
    entities.push(makeFireball(p.x+(p.facing>0?p.w+2:-2),p.y+p.h*0.4,p.facing));
    p.fireballCooldown=22;  // ~0.37s between shots, matches V3's 350ms
    Audio.enemyFire();
  }

  // Checkpoint
  if(lv.checkpoint){
    const cpx=lv.checkpoint.tx*T,cpy=lv.checkpoint.ty*T-PH;
    if(Math.abs(p.x-cpx)<T*2&&p.y>cpy-T*2)p.lastCheckpoint={x:cpx,y:cpy};
  }

  p.animTimer++;
  if(p.animTimer>8){p.animTimer=0;p.animFrame=(p.animFrame+1)%4;}
}

function killPlayer(lv){
  if(!player||player.invuln>0)return;
  // Classic Mario: powerup cushions one hit
  if(STATE.powerup>0){
    const oldPow=STATE.powerup;
    STATE.powerup--;
    player.invuln=INVULN_FRAMES;
    // Shrink back to tiny height if lost strong/flame tier
    if(oldPow>=1&&STATE.powerup===0&&player){
      player.h=PH;    // back to 28
      player.y+=14;   // shift down (feet stay on ground)
    }
    Audio.hit();
    spawnParticles(player.x+player.w/2,player.y+player.h/2,C.RED,8);
    return;
  }
  // Tiny hit — lose a life
  player.dead=true;player.deathTimer=80;
  player.vy=-10;
  Audio.hit();
  STATE.lives--;
  emitEvent('lives.changed',{lives:STATE.lives});
}

// killInstant: lava/pit kills — no powerup cushion, immediate death
function killInstant(lv){
  if(!player||player.dead)return;
  STATE.tr.deathCause='lava';
  STATE.powerup=0;
  if(player)player.h=PH;
  player.dead=true;
  player.deathTimer=80;
  player.vy=-8; player.vx=0;
  STATE.lives--;
  Audio.hit();
  spawnParticles(player.x+player.w/2,player.y+player.h/2,C.RED,14);
  spawnParticles(player.x+player.w/2,player.y+player.h/2,C.LAVA,10);
  emitEvent('lives.changed',{lives:STATE.lives});
}

function respawnPlayer(lv){
  if(STATE.lives<=0){
    STATE.screen='gameover';
    BGM.stop();
    emitEvent('session.abandoned',{world:STATE.world,level:STATE.level});
    return;
  }
  const cp=player.lastCheckpoint;
  player=makePlayer(0,0);
  player.x=cp.x;
  player.y=cp.y;
  player.lastCheckpoint={...cp};
  STATE.powerup=0;
  player.h=PH;          // reset to tiny height on respawn
  player.invuln=INVULN_FRAMES; // brief grace on respawn
  STATE.screen='game';  // ensure game screen is restored after any screen state change
}

// ─── BOX BUMP — process after physics ───────────────────────────────────────
function checkBoxBump(lv){
  if(!STATE._boxBump)return;
  const{tx,ty}=STATE._boxBump;
  STATE._boxBump=null;
  const box=entities.find(e=>e.type==='box'&&!e.hit&&
    Math.floor(e.x/T)===tx&&Math.floor(e.y/T)===ty);
  if(box)hitBox(box,lv);
}

// ─── ENTITY UPDATES ────────────────────────────────────────────────────────
function updateEntities(lv){
  checkBoxBump(lv); // process any box bump registered by resolveY this frame
  for(let i=entities.length-1;i>=0;i--){
    const e=entities[i];
    if(!e.alive&&e.type!=='box'&&e.type!=='coin'&&e.type!=='flagpole'){
      if(e.stompTimer>0){e.stompTimer--;continue;}
      else{entities.splice(i,1);continue;}
    }
    switch(e.type){
      case'goomba':case'spiny': updateWalker(e,lv);break;
      case'cheep':  updateCheep(e,lv);break;
      case'box':    updateBox(e,lv);break;
      case'coin':   updateCoin(e,lv);break;
      case'mushroom': updateMushroom(e,lv);break;
      case'fireflower':updateFireFlower(e,lv);break;
      case'fireball':  updateFireball(e,lv);break;
      case'heart':     updateHeart(e,lv);break;
      case'boss':   if(e.alive)updateBoss(e,lv);break;
      case'paper':  updatePaper(e,lv);break;
      case'flagpole':  checkFlagpole(e,lv);break;
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function updateWalker(e,lv){
  if(!e.alive){e.stompTimer--;return;}
  e.vy+=GRAVITY;e.vy=Math.min(e.vy,14);
  // Wall + edge detection
  const aheadX=e.x+(e.vx>0?e.w+1:-1);
  const wallTX=Math.floor(aheadX/T),wallTY=Math.floor((e.y+e.h/2)/T);
  const footTX=Math.floor(aheadX/T),footTY=Math.floor((e.y+e.h+2)/T);
  if(isSolid(getTile(lv,wallTX,wallTY)))e.vx*=-1;
  else if(e.onGround&&!isSolid(getTile(lv,footTX,footTY)))e.vx*=-1;
  moveEntity(e,lv);
  e.animTimer++;if(e.animTimer>12){e.animTimer=0;e.animFrame=(e.animFrame+1)%2;}
  if(!player||player.dead||player.invuln>0)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    if(player.vy>=-1&&player.y+player.h<=e.y+Math.floor(e.h*0.6)){
      if(e.stompable){stompEnemy(e);}
      else{player.vy=-5;STATE.tr.deathCause=e.type||'unknown';killPlayer(lv);}
    } else {
      if(e.graceFrames>0){e.graceFrames--;return;}
      if(STATE.starTimer>0||STATE.powerup===5)stompEnemy(e);
      else{STATE.tr.deathCause=e.type||'unknown';killPlayer(lv);}
    }
  }
  if(e.graceFrames>0)e.graceFrames--;
}

function stompEnemy(e){
  e.alive=false;e.stompTimer=20;e.vy=0;
  player.vy=-7;
  STATE.score+=100;
  Audio.stomp();
  spawnParticles(e.x+e.w/2,e.y,C.SLATE,5);
  if(coachmark&&coachmark.enemy_trigger){coachmark.dismissed=true;coachmark.visible=false;}
  emitEvent('threat.hit',{type:e.type,method:'stomp'});
  // Training: float callout above stomp point
  const _sc=TR.stompText[e.type];
  if(_sc)addFloatText(_sc,e.x+e.w/2,e.y-6,C.EMERALD);
}

function updateCheep(e,lv){
  if(!e.alive)return;
  e.leapTimer--;
  if(e.inWater){
    e.y=e.waterY+Math.sin(STATE.frame*0.05)*6;
    if(e.leapTimer<=0){e.inWater=false;e.vy=-9;e.leapTimer=80+(Math.random()*40)|0;}
  } else {
    e.vy+=GRAVITY;e.y+=e.vy;e.x+=e.vx;
    if(e.y>e.waterY+T){e.inWater=true;e.vy=0;}
    if(!player||player.dead||player.invuln>0)return;
    if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
      if(player.vy>0&&player.y+player.h<=e.y+10)stompEnemy(e);
      else if(STATE.starTimer>0)stompEnemy(e);
      else killPlayer(lv);
    }
  }
}

function updateBox(e,lv){
  if(e._cooldown&&e._cooldown>0)e._cooldown--; // drain wrong-answer re-trigger cooldown
  if(e.animPhase===0){
    // Idle: slow pulse (critique: was too fast at 0.006, slowed to ~0.003)
    e.glowIntensity=0.5+0.5*Math.sin(STATE.frame*0.003);
    // Approach glow: brighten when player is within 80px (critique §3)
    if(player&&!player.dead){
      const dist=Math.abs((player.x+player.w/2)-(e.x+T/2));
      if(dist<80) e.glowIntensity=Math.min(1,e.glowIntensity+0.3);
    }
    // Note: actual bump trigger comes from checkBoxBump() via resolveY
  } else if(e.animPhase===1){
    // Flash phase: amber flash + glyph rotation — ANTICIPATION CUE (critique #1)
    e.animTimer++;
    e.rotation=Math.sin(e.animTimer*0.45)*0.5; // rotate the ? glyph
    e.glowIntensity=0.7+0.3*Math.sin(e.animTimer*0.8); // amber flash
    if(e.animTimer>24){e.animPhase=2;e.animTimer=0;}
  } else if(e.animPhase===2){
    // Pause phase — 400ms at 60fps ≈ 24 frames (critique: half-second before card)
    e.animTimer++;
    if(e.animTimer>24){
      if(e.quiz&&QUIZZES[e.quiz]){
        showQuiz(e);
        e.animPhase=3; // mark triggered — wrong answer in handleQuizAnswer will reset to 0
      } else {
        deliverBoxReward(e,lv);e.animPhase=3;
      }
    }
  }
}

function hitBox(e,lv){
  if(e.hit||e.animPhase!==0||(e._cooldown&&e._cooldown>0))return; // prevent double-trigger + post-wrong cooldown
  e.hit=true;e.animPhase=1;e.animTimer=0;
  Audio.powerup(0);
  if(player) player.vy=-1.5; // tiny head-bump bounce
  // INSTANT FREEZE: switch to 'boxanim' state so enemies cannot move or
  // damage the player from the moment of contact through the entire quiz
  STATE.screen='boxanim';
}

function showQuiz(e){
  STATE.quizActive={
    quiz:QUIZZES[e.quiz],boxEntity:e,
    answered:false,selected:-1,result:null,
    wrongAnim:0,timeout:360
  };
  STATE.screen='quiz';
  emitEvent('quiz.shown',{quizId:e.quiz});
  const el=document.getElementById('aria-live');
  if(el)el.textContent=QUIZZES[e.quiz].q+'. Options: '+QUIZZES[e.quiz].opts.join(', ');
}

function deliverBoxReward(e,lv){
  // Training: IQ flash for answering correctly
  const _qk=e.quiz;if(_qk&&QUIZZES[_qk]){
    const _topics={'pw_strongest':'Password Strength','pw_reuse':'Credential Stuffing','pw_length':'Brute Force Defense','pw_hygiene':'Password Management','xkcd_length':'Entropy Math','cred_stuffing':'Credential Stuffing','recovery_codes':'Account Recovery','zero_trust':'Zero Trust','mfa_types':'Phishing-Resistant MFA','sms_risk':'SIM Swap Risk','pw_manager':'Password Managers','autofill_risk':'Autofill Security','least_privilege':'Least Privilege','jit_elevation':'JIT Access','passkeys':'Passkeys / FIDO2','account_recovery':'Account Recovery'};
    const _topic=_topics[_qk]||'Security Knowledge';
    STATE.tr.iqFlash={text:'+'+(20+Object.keys(_topics).indexOf(_qk))+' IQ  ·  '+_topic,timer:150,color:C.EMERALD};
  }
  if(!e.reward)return;
  if(e.reward==='mushroom'){
    // Mario-style smart upgrade: already strong? give fire flower instead
    if(STATE.powerup>=1){
      entities.push(makeFireFlower(e.x,e.y));
      spawnParticles(e.x+T/2,e.y,C.EMERALD,12);
      spawnParticles(e.x+T/2,e.y,C.AMBER,8);
      showMsg('FIRE FLOWER UPGRADE! → PRESS Z TO SHOOT',C.EMERALD,200);
      Audio.powerup(2);
    } else {
      entities.push(makeMushroom(e.x,e.y));
      spawnParticles(e.x+T/2,e.y,C.AMBER,12);
      spawnParticles(e.x+T/2,e.y,C.CYAN,8);
      showMsg('MUSHROOM! → RUN TO CATCH IT',C.AMBER,160);
      Audio.powerup(1);
    }
  } else if(e.reward==='fireflower'){
    entities.push(makeFireFlower(e.x,e.y));
    spawnParticles(e.x+T/2,e.y,C.EMERALD,12);
    spawnParticles(e.x+T/2,e.y,C.AMBER,8);
    showMsg('FIRE FLOWER! → PRESS Z TO SHOOT',C.EMERALD,200);
    Audio.powerup(2);
  } else if(e.reward==='heart'){
    entities.push(makeHeart(e.x+T/2,e.y));
    spawnParticles(e.x+T/2,e.y,C.RED,10);
    showMsg('RECOVERY CODE HEART! +1 LIFE',C.RED,160);
    Audio.powerup(4);
  } else if(e.reward&&e.reward.startsWith('coins')){
    const n=parseInt(e.reward.replace('coins',''))||5;
    for(let c=0;c<n;c++)
      particles.push(makeParticle(e.x+T/2,e.y,C.COIN,(Math.random()-0.5)*4,-5-Math.random()*3,40));
    STATE.coins+=n;STATE.score+=n*10;
    showMsg(`+${n} COINS`,C.COIN,80);
    Audio.coin();
  }
}

function updateCoin(e,lv){
  if(e.collected)return;
  e.spinAngle+=0.1;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;STATE.coins++;STATE.score+=50;
    Audio.coin();spawnParticles(e.x+5,e.y,C.COIN,4);
    emitEvent('coin.collected',{});
  }
}

function updateMushroom(e,lv){
  if(e.collected)return;
  if(e.emerging){
    e.y-=0.6;
    if(e.y<=e.targetY){
      // Critique #2: pause at top FIRST (Mario-style), then start walking
      e.pauseFrames=(e.pauseFrames||0)+1;
      if(e.pauseFrames<28)return; // hold at top for ~0.5s
      e.emerging=false;e.vx=1.4;
    }
    return;
  }
  e.vy+=GRAVITY;moveEntity(e,lv);
  if(e.onGround&&e.vx===0)e.vx=1.4;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;
    const oldPow=STATE.powerup;
    STATE.powerup=Math.min(STATE.powerup+1,5);
    // V3-spec: player VISUALLY GROWS when collecting mushroom (tiny→strong)
    if(oldPow===0&&player){
      player.h=PH+14;  // 28→42: matches V3's "slightly larger sprite"
      player.y-=14;    // shift up so feet stay on ground
    }
    Audio.powerup(STATE.powerup);
    spawnParticles(e.x+14,e.y,C.AMBER,14);
    spawnParticles(e.x+14,e.y,C.CYAN,8);
    showMsg('STRONG-PASSWORD UNLOCKED! You grew stronger!',C.AMBER,150);
    STATE.tr.powerupCard={...TR.powerupMsg.mushroom,timer:140};
    emitEvent('power_up.collected',{type:'mushroom',tier:STATE.powerup});
  }
}

function updateFireFlower(e,lv){
  if(e.collected)return;
  if(e.emerging){e.y-=0.6;if(e.y<=e.targetY)e.emerging=false;return;}
  e.bobPhase+=0.08;e.y+=Math.sin(e.bobPhase)*0.35;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;
    const oldPow=STATE.powerup;
    STATE.powerup=Math.max(STATE.powerup,2);
    // Grow to strong height if was tiny
    if(oldPow===0&&player){
      player.h=PH+14;
      player.y-=14;
    }
    Audio.powerup(2);
    spawnParticles(e.x+12,e.y,C.EMERALD,16);
    spawnParticles(e.x+12,e.y,C.AMBER,10);
    spawnParticles(e.x+12,e.y,C.CYAN,6);
    showMsg('FIRE FLOWER! Press Z to shoot fireballs!',C.EMERALD,180);
    STATE.tr.powerupCard={...TR.powerupMsg.fireflower,timer:140};
    emitEvent('power_up.collected',{type:'fireflower',tier:2});
  }
}

function updateFireball(e,lv){
  if(!e.alive)return;
  e.vy+=GRAVITY*0.5;e.x+=e.vx;e.y+=e.vy;
  const tx=Math.floor((e.x+5)/T),ty=Math.floor((e.y+8)/T);
  if(isSolid(getTile(lv,tx,ty))){
    if(e.vy>0){e.vy*=-0.6;e.bounces++;}else e.alive=false;
  }
  if(isSolid(getTile(lv,Math.floor(e.x/T),Math.floor(e.y/T))))e.alive=false;
  if(e.bounces>3)e.alive=false;
  if(e.x<camera.x-T*2||e.x>camera.x+820)e.alive=false;
  for(const en of entities){
    if(!en.alive)continue;
    if(!['goomba','spiny','cheep','boss'].includes(en.type))continue;
    if(rectRect(e.x,e.y,e.w,e.h,en.x,en.y,en.w,en.h)){
      if(en.type==='boss'){
        en.hp-=1;Audio.bossHit();
        spawnParticles(en.x+28,en.y+36,C.CYAN,5);
        if(en.hp<=0)bossDied(en);
        // Training: boss phase 2 dramatic reveal
        if(en.hp<=en.maxHp/2&&en.phase===1){en.phase=2;STATE.tr.bossRevealTimer=120;}
      } else {
        en.fireHitCount=(en.fireHitCount||0)+1;
        if(en.fireHitCount>=en.fireHits){
          en.alive=false;en.stompTimer=15;STATE.score+=150;
          spawnParticles(en.x+en.w/2,en.y,C.AMBER,7);
          addFloatText(TR.stompText[en.type]||'Threat eliminated',en.x+en.w/2,en.y-6,C.AMBER);
          emitEvent('threat.hit',{type:en.type,method:'fireball'});
        }
      }
      e.alive=false;Audio.stomp();break;
    }
  }
}

function updateHeart(e,lv){
  if(e.collected)return;
  e.vy+=GRAVITY*0.3;e.x+=e.vx;e.y+=e.vy;e.age++;
  if(e.age>200)e.collected=true;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;STATE.lives++;Audio.powerup(4);
    spawnParticles(e.x+T/2,e.y,C.RED,8);
    STATE.tr.powerupCard={...TR.powerupMsg.heart,timer:140};
    emitEvent('lives.changed',{lives:STATE.lives});
    emitEvent('power_up.collected',{type:'heart'});
  }
}

function updateBoss(e,lv){
  if(!e.alive)return;
  // Knowledge gate at 50% HP
  if(!e.knowledgeGateShown&&e.hp<=e.maxHp/2){
    e.knowledgeGateShown=true;
    STATE.quizActive={
      quiz:QUIZZES['least_privilege'],
      boxEntity:{...e,_bossGate:true},
      answered:false,selected:-1,result:null,
      wrongAnim:0,timeout:360
    };
    STATE.screen='quiz';
    BGM.start('boss');
    e.stunTimer=180;
    return;
  }
  if(e.stunTimer>0){e.stunTimer--;return;}

  e.vy+=GRAVITY;
  e.x+=e.vx;
  if(e.x<camera.x+50){e.vx=Math.abs(e.vx);}
  if(e.x>camera.x+650){e.vx=-Math.abs(e.vx);}
  moveEntity(e,lv);

  // Throw papers
  e.throwTimer--;
  if(e.throwTimer<=0){
    e.throwTimer=e.phase===2?28:55;
    const highArc=(entities.filter(x=>x.type==='paper').length%2)===0;
    const _cIdx=Math.floor(Math.random()*TR.paperCreds.length);
    entities.push({
      type:'paper',x:e.x+e.w/2,y:e.y+20,
      vx:(player&&!player.dead)?(player.x>e.x?2.2:-2.2):2.2,
      vy:highArc?-7:-3,
      alive:true,w:10,h:10,animAngle:0,
      cred:TR.paperCreds[_cIdx]
    });
  }

  if(!player||player.dead||player.invuln>0)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    if(player.vy>0&&player.y+player.h<=e.y+18){
      e.hp-=(STATE.powerup>=2)?2:1;
      player.vy=-8;Audio.bossHit();
      spawnParticles(e.x+28,e.y,C.SLATE,6);
      e.stunTimer=15;
      if(e.hp<=0)bossDied(e);
    } else if(STATE.starTimer>0||STATE.powerup===5){
      e.hp-=2;if(e.hp<=0)bossDied(e);
    } else {
      killPlayer(lv);
    }
  }
  e.animTimer++;if(e.animTimer>8){e.animTimer=0;e.animFrame=(e.animFrame+1)%2;}
}

function bossDied(e){
  e.alive=false;
  Audio.levelComplete();
  spawnParticles(e.x+28,e.y+36,C.CYAN,20);
  spawnParticles(e.x+28,e.y+36,C.AMBER,20);
  STATE.score+=2000;
  emitEvent('threat.hit',{type:'boss',method:'defeated'});
  setTimeout(()=>{
    STATE.screen='levelcomplete';
    emitEvent('wave.completed',{world:STATE.world,level:STATE.level,score:STATE.score});
  },1600);
}

function updatePaper(e,lv){
  if(!e.alive)return;
  e.vy+=GRAVITY;e.x+=e.vx;e.y+=e.vy;e.animAngle+=0.12;
  if(e.y>lv.h*T){e.alive=false;return;}
  if(!player||player.dead||player.invuln>0)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.alive=false;STATE.tr.deathCause='paper';killPlayer(lv);
  }
}

function checkFlagpole(e,lv){
  if(!player||player.dead)return;
  if(STATE.flagClimbing||STATE.flagClimbTimer>0)return; // already triggered
  if(STATE.screen==='levelcomplete')return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    // Quiz gate: must answer all boxes before advancing
    if(STATE.quizzesRequired>0&&STATE.quizzesPassed<STATE.quizzesRequired){
      const remaining=STATE.quizzesRequired-STATE.quizzesPassed;
      showMsg(`Answer ${remaining} more quiz box${remaining>1?'es':''} (?) to advance!`,C.AMBER,150);
      return;
    }
    // Lock player to pole centre and start slide animation
    STATE.flagClimbing=true;
    STATE.flagpoleLockedX=e.x+Math.floor((e.w-player.w)/2);
    STATE.flagpoleBottomY=(lv.h-2)*T-player.h; // feet land on ground row
    player.vx=0; player.vy=0;
    player.x=STATE.flagpoleLockedX;
    player.facing=1;
    Audio.levelComplete();
    STATE.score+=500;
    emitEvent('wave.completed',{world:STATE.world,level:STATE.level,score:STATE.score});
  }
}

// ─── QUIZ HANDLING ─────────────────────────────────────────────────────────
function handleQuizAnswer(idx){
  if(!STATE.quizActive||STATE.quizActive.answered)return;
  STATE.quizActive.answered=true;
  STATE.quizActive.selected=idx;
  const q=STATE.quizActive.quiz;
  const correct=idx===q.correct;
  STATE.quizActive.result=correct?'correct':'wrong';
  emitEvent('quiz.answered',{correct,answer:idx});

  const el=document.getElementById('aria-live');
  if(el)el.textContent=correct?'Correct! '+q.explain:'Incorrect. '+q.explain;

  if(correct){
    Audio.quizCorrect();
    const be=STATE.quizActive.boxEntity;
    if(be){
      if(be._bossGate){
        // Boss knowledge gate passed — boss stays stunned
        const boss=entities.find(x=>x.type==='boss'&&x.alive);
        if(boss){boss.stunTimer=180;boss.knowledgeGatePassed=true;}
      } else {
        deliverBoxReward(be,STATE.currentLevel);
        be.animPhase=3;be.hit=true;
        STATE.quizzesPassed++;
      }
    }
  } else {
    Audio.quizWrong();
    STATE.quizActive.wrongAnim=90;
    const be=STATE.quizActive.boxEntity;
    if(be){
      if(be._bossGate){
        // Wrong boss gate — boss heals to full, enters phase 2
        const boss=entities.find(x=>x.type==='boss'&&x.alive);
        if(boss){boss.hp=boss.maxHp;boss.phase=2;boss.knowledgeGateShown=false;}
      } else {
        // Box reset happens in dismissQuiz so player can read the feedback first
      }
    }
  }
}

function dismissQuiz(){
  // If wrong answer, reset the box NOW (after player read feedback) so it can be re-bumped
  if(STATE.quizActive&&STATE.quizActive.result==='wrong'){
    const be=STATE.quizActive.boxEntity;
    if(be&&!be._bossGate){be.hit=false;be.animPhase=0;be.animTimer=0;be._cooldown=150;} // 2.5-second grace before re-bump
  }
  STATE.screen='game';
  STATE.quizActive=null;
  const el=document.getElementById('aria-live');
  if(el)el.textContent='';
  document.getElementById('gameCanvas').focus();
}

// ─── CANVAS + CTX ────────────────────────────────────────────────────────────
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

function cls(){ctx.fillStyle=C.BG;ctx.fillRect(0,0,canvas.width,canvas.height);}

// Rounded rectangle path helper (cross-browser safe)
function roundRect(x,y,w,h,r){
  const rr=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.lineTo(x+w-rr,y);ctx.arcTo(x+w,y,x+w,y+rr,rr);
  ctx.lineTo(x+w,y+h-rr);ctx.arcTo(x+w,y+h,x+w-rr,y+h,rr);
  ctx.lineTo(x+rr,y+h);ctx.arcTo(x,y+h,x,y+h-rr,rr);
  ctx.lineTo(x,y+rr);ctx.arcTo(x,y,x+rr,y,rr);
  ctx.closePath();
}
// Fill a rounded rect in one call
function rrFill(x,y,w,h,r,col){ctx.fillStyle=col;roundRect(x,y,w,h,r);ctx.fill();}
// Fill an ellipse in one call
function ellipseFill(cx,cy,rx,ry,col){ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();}

// ─── TILE DRAWING ────────────────────────────────────────────────────────────
function drawTile(tile,sx,sy){
  switch(tile){
    case 1: { // Ground — gradient body + cyan top highlight + amber studs
      const g1=ctx.createLinearGradient(sx,sy,sx,sy+T);
      g1.addColorStop(0,'#214d7a');g1.addColorStop(1,'#0f172a');
      ctx.fillStyle=g1;ctx.fillRect(sx,sy,T,T);
      // Cyan top-edge highlight
      ctx.fillStyle=C.CYAN;ctx.fillRect(sx,sy,T,2);
      // Subtle grid seam
      ctx.fillStyle='rgba(34,211,238,0.10)';
      ctx.fillRect(sx+T/2,sy+2,1,T-2);ctx.fillRect(sx,sy+T/2,T,1);
      // Amber corner studs
      ctx.fillStyle=C.AMBER;
      ctx.fillRect(sx,sy,3,3);ctx.fillRect(sx+T-3,sy,3,3);
      break;
    }
    case 2: { // Platform — gradient + rounded-feel top highlight + amber studs
      const g2=ctx.createLinearGradient(sx,sy,sx,sy+T);
      g2.addColorStop(0,'#1a607a');g2.addColorStop(0.5,'#0e4a60');g2.addColorStop(1,'#071e2a');
      ctx.fillStyle=g2;ctx.fillRect(sx,sy,T,T);
      // Bright top 3px
      ctx.fillStyle=C.CYAN;ctx.fillRect(sx,sy,T,3);
      // Softer inner glow
      ctx.fillStyle='rgba(34,211,238,0.08)';ctx.fillRect(sx,sy+3,T,8);
      // Amber corner studs
      ctx.fillStyle=C.AMBER;
      ctx.fillRect(sx,sy,3,3);ctx.fillRect(sx+T-3,sy,3,3);
      break;
    }
    case 3: { // Brick — gradient + mortar lines
      const g3=ctx.createLinearGradient(sx,sy,sx,sy+T);
      g3.addColorStop(0,'#1e456e');g3.addColorStop(1,'#0b2040');
      ctx.fillStyle=g3;ctx.fillRect(sx,sy,T,T);
      ctx.strokeStyle='rgba(14,116,144,0.4)';ctx.lineWidth=1;
      ctx.strokeRect(sx+0.5,sy+0.5,T-1,T-1);
      ctx.fillStyle='rgba(14,116,144,0.20)';
      ctx.fillRect(sx+T/2,sy,1,T);ctx.fillRect(sx,sy+T/2,T,1);
      break;
    }
    case 5: // Pipe body
      ctx.fillStyle='#0d4a2a';ctx.fillRect(sx,sy,T,T);
      ctx.fillStyle='#10b981';ctx.fillRect(sx+2,sy,T-4,T);
      ctx.fillStyle='#065f3c';ctx.fillRect(sx,sy,4,T);
      break;
    case 6: // Pipe top
      ctx.fillStyle='#10b981';ctx.fillRect(sx-3,sy,T+6,T);
      ctx.fillStyle='#065f3c';ctx.fillRect(sx-3,sy,4,T);
      break;
    case 7: // Water — transparent so entities swimming inside remain visible
      ctx.fillStyle=`rgba(0,40,140,${0.22+0.06*Math.sin(STATE.frame*0.04+(sx+sy)*0.01)})`;
      ctx.fillRect(sx,sy,T,T);
      // Subtle animated shimmer stripe near top of each tile
      ctx.fillStyle=`rgba(34,211,238,${0.10+0.06*Math.sin(STATE.frame*0.07+sx*0.02)})`;
      ctx.fillRect(sx,sy,T,4);
      // Faint right-edge caustic line
      ctx.fillStyle='rgba(34,211,238,0.07)';ctx.fillRect(sx+T-2,sy+4,2,T-8);
      break;
    case 8: { // Castle wall — dark gradient, stone-block texture
      const g8=ctx.createLinearGradient(sx,sy,sx+T,sy+T);
      g8.addColorStop(0,'#1e2d3d');g8.addColorStop(1,'#0d1520');
      ctx.fillStyle=g8;ctx.fillRect(sx,sy,T,T);
      // Stone mortar lines
      ctx.strokeStyle='rgba(51,65,85,0.6)';ctx.lineWidth=1;
      ctx.strokeRect(sx+0.5,sy+0.5,T-1,T-1);
      // Top edge highlight
      ctx.fillStyle='rgba(71,85,105,0.4)';ctx.fillRect(sx,sy,T,2);
      break;
    }
    case 9: { // Lava — animated flame tongues rising from molten surface
      const f9=STATE.frame;
      // Base: deep pulsing crimson pool
      const rr=150+30*Math.sin(f9*0.07+sx*0.008);
      ctx.fillStyle=`rgb(${rr},15,5)`;
      ctx.fillRect(sx,sy,T,T);
      // Molten glow band near surface
      const surfAlpha=0.35+0.15*Math.sin(f9*0.1+sx*0.012);
      ctx.fillStyle=`rgba(200,55,15,${surfAlpha})`;
      ctx.fillRect(sx,sy,T,T*0.35);
      // Four animated flame tongues per tile, staggered in phase
      for(let fi=0;fi<4;fi++){
        const phase=f9*0.13+fi*1.48+sx*0.009;
        const fh=7+8*Math.abs(Math.sin(phase));       // flame height
        const fw=3+2*Math.abs(Math.sin(phase*0.8));   // half-width
        const fx=sx+T*0.1+fi*(T*0.22)+3*Math.sin(phase*1.4); // x wobble
        // Outer tongue: orange-red
        ctx.fillStyle=`rgba(230,75,15,${0.75+0.2*Math.sin(phase)})`;
        ctx.beginPath();
        ctx.moveTo(fx-fw*1.4,sy);
        ctx.quadraticCurveTo(fx-fw*0.4,sy-fh*0.55,fx,sy-fh);
        ctx.quadraticCurveTo(fx+fw*0.4,sy-fh*0.55,fx+fw*1.4,sy);
        ctx.closePath();ctx.fill();
        // Inner core: amber-yellow
        ctx.fillStyle=`rgba(251,191,36,${0.65+0.25*Math.sin(phase+0.5)})`;
        ctx.beginPath();
        ctx.moveTo(fx-fw*0.7,sy);
        ctx.quadraticCurveTo(fx-fw*0.2,sy-fh*0.5,fx,sy-fh*0.78);
        ctx.quadraticCurveTo(fx+fw*0.2,sy-fh*0.5,fx+fw*0.7,sy);
        ctx.closePath();ctx.fill();
        // Tip spark: near-white flicker
        const sparkA=Math.max(0,Math.sin(phase*1.7))*0.6;
        if(sparkA>0.1){
          ctx.fillStyle=`rgba(255,250,180,${sparkA})`;
          ctx.fillRect(fx-1,sy-fh+1,2,3);
        }
      }
      break;
    }
      break;
  }
}

function drawLevel(lv){
  // Draw tombstone props and intel terminal behind tiles (world props layer)
  drawTombstones(lv);
  drawIntelTerminal(lv);
  const startX=Math.max(0,Math.floor(camera.x/T)-1);
  const endX=Math.min(lv.w,startX+28);
  for(let ty=0;ty<lv.h;ty++){
    for(let tx=startX;tx<endX;tx++){
      const tile=lv.tiles[ty][tx];
      if(tile===0||tile===4)continue;
      drawTile(tile,tx*T-camera.x,ty*T);
    }
  }
}

function drawParallax(){
  if(STATE.reducedMotion)return;
  ctx.fillStyle='rgba(14,116,144,0.055)';
  const off=(camera.x*0.3)%48;
  for(let x=-48;x<canvas.width+48;x+=48)
    for(let y=0;y<canvas.height;y+=48)
      ctx.fillRect(x-off+1,y+1,1,1);
}

// ─── LEVEL BACKGROUND DECORATIONS ────────────────────────────────────────────
// Purely ambient — very low alpha, no solid shapes that could be mistaken for tiles
function drawLevelBackground(lv){
  if(!lv||STATE.reducedMotion)return;
  const W=canvas.width,H=canvas.height;
  const f=STATE.frame;
  const camOff=camera.x;
  const world=lv.world||1;

  // Shared: twinkling star dots (all worlds)
  const starSeeds=[3,11,17,29,41,53,67,79,89,101,113,127];
  starSeeds.forEach(s=>{
    const bx=((s*193+camOff*0.04)%(W+80))-40;
    const by=18+((s*71)%100);
    const alpha=0.08+0.06*Math.sin(f*0.03+s*0.7);
    ctx.fillStyle=`rgba(34,211,238,${alpha})`;
    ctx.fillRect(bx,by,2,2);
  });

  // Amber accent dots (sparse)
  [19,53,83].forEach(s=>{
    const bx=((s*211+camOff*0.03)%(W+80))-40;
    const by=30+((s*47)%80);
    const alpha=0.05+0.04*Math.sin(f*0.05+s);
    ctx.fillStyle=`rgba(251,191,36,${alpha})`;
    ctx.fillRect(bx,by,2,2);
  });

  // World-specific subtle accents
  if(world===1){
    // Plains: faint horizontal scan lines near ground (circuit feel)
    ctx.save();ctx.globalAlpha=0.025;ctx.strokeStyle=C.CYAN;ctx.lineWidth=1;
    const scanOff=(camOff*0.18)%80;
    for(let i=0;i<4;i++){
      const ly=H-60+i*16;
      ctx.beginPath();ctx.moveTo(-scanOff,ly);ctx.lineTo(W-scanOff+80,ly);ctx.stroke();
    }
    ctx.restore();
  } else if(world===2||world===3){
    // Mountains/Vault: faint diagonal lines (very subtle)
    ctx.save();ctx.globalAlpha=0.02;ctx.strokeStyle=C.CYAN;ctx.lineWidth=1;
    const dOff=(camOff*0.12)%60;
    for(let hx=-60;hx<W+60;hx+=60){
      ctx.beginPath();ctx.moveTo(hx-dOff,0);ctx.lineTo(hx-dOff+H*0.5,H);ctx.stroke();
    }
    ctx.restore();
  } else if(world===5){
    // Castle: ominous ember glow at bottom edges
    const grd=ctx.createLinearGradient(0,H-80,0,H);
    grd.addColorStop(0,'rgba(220,38,38,0)');
    grd.addColorStop(1,'rgba(220,38,38,0.04)');
    ctx.fillStyle=grd;ctx.fillRect(0,H-80,W,80);
  }
}

// ─── ENTITY DRAWING ──────────────────────────────────────────────────────────
function drawPlayer(){
  if(!player)return;
  const p=player;
  const sx=p.x-camera.x;
  if(p.dead){
    ctx.save();ctx.translate(sx+p.w/2,p.y+p.h/2);
    ctx.rotate(STATE.frame*0.18);
    drawPlayerShape(-p.w/2,-p.h/2,true);
    ctx.restore();return;
  }
  if(p.invuln>0&&Math.floor(p.invuln/4)%2===1)return;
  ctx.save();
  ctx.translate(sx+p.w/2,p.y+p.h/2);
  if(p.facing<0)ctx.scale(-1,1);
  drawPlayerShape(-p.w/2,-p.h/2,false);
  ctx.restore();
}

function drawPlayerShape(ox,oy,small){
  // V3-spec pixel-art hero — cyan humanoid with facing-aware details
  // PH=28 at T=32 — distinct head + visor + torso + chest key + legs + arms
  const tier=STATE.powerup;
  const facing=player?player.facing:1; // 1=right, -1=left
  const isStrong=(tier>=1);
  const isFlame=(tier>=2);
  // Use live player.h so the sprite visually grows/shrinks with powerup (V3 spec)
  const h=small?16:(player?player.h:PH), w=PW;

  // Body colour by tier
  let body=C.CYAN, bodyDk=C.CYAN_DIM;
  if(isFlame){body=C.CYAN;bodyDk=C.CYAN_DIM;} // flame keeps cyan body, adds amber aura
  if(tier>=4&&STATE.starTimer>0){
    body=`hsl(${(STATE.frame*8)%360},90%,55%)`;bodyDk=body;
  }

  // FLAME: pulsing amber outer glow + cyan inner ring (V3 spec)
  if(isFlame&&!small){
    const pulse=0.45+0.25*Math.sin(STATE.frame*0.012);
    ctx.fillStyle=`rgba(251,191,36,${pulse})`;
    ctx.fillRect(ox-8,oy-8,w+16,h+16);
    ctx.fillStyle='rgba(34,211,238,0.20)';
    ctx.fillRect(ox-4,oy-4,w+8,h+8);
  }
  // Cape
  if(tier>=3&&!small){
    ctx.fillStyle='#7c3aed';
    const cx=facing>0?ox:ox+w;const cx2=facing>0?ox-10:ox+w+10;
    ctx.beginPath();ctx.moveTo(cx,oy+6);ctx.lineTo(cx2,oy+h*0.8);ctx.lineTo(cx,oy+h*0.65);ctx.fill();
  }

  // HEAD — narrower than body, 4px top padding
  ctx.fillStyle=body;
  ctx.fillRect(ox+4,oy,w-8,10);
  ctx.fillStyle=bodyDk;
  ctx.fillRect(ox+4,oy,w-8,2); // top edge shadow

  // VISOR / eye — facing-aware (V3 spec)
  const eyeX=facing>0 ? ox+w-10 : ox+4;
  ctx.fillStyle=C.BG;
  ctx.fillRect(eyeX,oy+4,6,3);   // visor slot
  ctx.fillStyle=isFlame?C.CYAN:C.AMBER; // V3: eye flips cyan in flame
  ctx.fillRect(eyeX+2,oy+5,2,1); // pupil pixel

  // TORSO
  ctx.fillStyle=body;
  ctx.fillRect(ox+2,oy+10,w-4,h-18);
  ctx.fillStyle=bodyDk;
  ctx.fillRect(ox+2,oy+10,w-4,2); // shoulder shadow

  // CHEST KEY — V3 spec: amber key in Strong, white-hot in Flame (critique: make 6×6 not 4×4)
  if(isStrong&&!small){
    if(isFlame){
      ctx.fillStyle=C.CYAN_DIM;ctx.fillRect(ox+w/2-4,oy+12,8,8); // outer ring
      ctx.fillStyle=C.WHITE;ctx.fillRect(ox+w/2-3,oy+13,6,6);    // white hot core
      ctx.fillStyle=C.AMBER;ctx.fillRect(ox+w/2-1,oy+18,2,5);    // key shaft
    } else {
      ctx.fillStyle=C.AMBER;ctx.fillRect(ox+w/2-3,oy+13,6,6);    // amber key head (6×6)
      ctx.fillRect(ox+w/2-1,oy+19,2,4);                           // key shaft
    }
  }

  // Flame ember in hand (V3: "small ember tucked into trailing hand")
  if(isFlame&&!small){
    const eX=facing>0 ? ox-1 : ox+w-2;
    const eY=oy+14+Math.sin(STATE.frame*0.02)*1;
    ctx.fillStyle=C.AMBER;ctx.fillRect(eX,eY,3,3);
    ctx.fillStyle=C.WHITE;ctx.fillRect(eX+1,eY+1,1,1);
  }

  // LEGS — alternating step animation when walking (V3 spec)
  const step=(!small&&player&&player.onGround&&Math.abs(player.vx)>0.3)?
    (Math.floor(player.animFrame/2)%2===0?1:-1):0;
  ctx.fillStyle=body;
  ctx.fillRect(ox+4,oy+h-8,5,8);    // left leg
  ctx.fillRect(ox+w-9,oy+h-8,5,8);  // right leg
  ctx.fillStyle=bodyDk;
  ctx.fillRect(ox+4,   oy+h-2+step,   5,2); // left foot
  ctx.fillRect(ox+w-9, oy+h-2-step,   5,2); // right foot

  // ARMS — rise when airborne (V3 spec)
  const armOff=(!small&&player&&!player.onGround)?-3:0;
  ctx.fillStyle=body;
  ctx.fillRect(ox,        oy+12+armOff, 3,7);  // left arm
  ctx.fillRect(ox+w-3,    oy+12-armOff, 3,7);  // right arm

  // Crown (tier 5)
  if(tier>=5&&!small){
    ctx.fillStyle=C.AMBER;
    ctx.beginPath();ctx.moveTo(ox,oy-14);ctx.lineTo(ox+w/2,oy-22);ctx.lineTo(ox+w,oy-14);
    ctx.lineTo(ox+w-2,oy-12);ctx.lineTo(ox+2,oy-12);ctx.closePath();ctx.fill();
  }
}

function drawEntities(lv){
  for(const e of entities){
    const sx=e.x-camera.x;
    if(sx<-80||sx>canvas.width+80)continue;
    switch(e.type){
      case'goomba': drawGoomba(e,sx);break;
      case'spiny':  drawSpiny(e,sx);break;
      case'cheep':  drawCheep(e,sx);break;
      case'box':    drawBox(e,sx);break;
      case'coin':   if(!e.collected)drawCoin(e,sx);break;
      case'mushroom':if(!e.collected)drawMushroom(e,sx);break;
      case'fireflower':if(!e.collected)drawFireFlower(e,sx);break;
      case'fireball':if(e.alive)drawFireball(e,sx);break;
      case'heart':  if(!e.collected)drawHeart(e,sx);break;
      case'boss':   if(e.alive)drawBoss(e,sx);break;
      case'paper':  if(e.alive)drawPaper(e,sx);break;
      case'flagpole':drawFlagpole(e,sx,lv);break;
    }
  }
  drawScrollEntities();
}

function drawGoomba(e,sx){
  if(!e.alive){
    // Squashed flat — rounded pancake
    rrFill(sx,e.y+e.h-6,e.w,6,3,C.SLATE);
    rrFill(sx+1,e.y+e.h-4,e.w-2,3,2,C.AMBER);
    return;
  }
  const bob=Math.sin(e.animFrame*0.5)*1.5;
  const y=e.y+bob;
  const w=e.w,h=e.h;

  // Body — rounded rectangle, gradient top
  const gb=ctx.createLinearGradient(sx,y,sx,y+h);
  gb.addColorStop(0,'#7b8fa3');gb.addColorStop(1,'#475569');
  rrFill(sx+1,y+4,w-2,h-4,6,'#475569');
  ctx.fillStyle=gb;roundRect(sx+1,y+4,w-2,h-4,6);ctx.fill();
  // Rounded head / cap
  rrFill(sx+4,y,w-8,12,6,'#64748b');

  // Amber "Password123" threat stripe
  rrFill(sx+1,y+h-6,w-2,5,3,C.AMBER);
  ctx.fillStyle=C.BG;ctx.font='5px Inter';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('PW',sx+w/2,y+h-5);

  // Eyes — round dots
  ellipseFill(sx+7,y+9,3,3,C.RED);
  ellipseFill(sx+w-8,y+9,3,3,C.RED);
  ellipseFill(sx+7,y+10,1.5,1.5,C.BG);
  ellipseFill(sx+w-8,y+10,1.5,1.5,C.BG);

  // Feet — rounded nubs
  const step=e.animFrame%2===0;
  rrFill(sx+(step?1:5),y+h-1,6,4,2,'#334155');
  rrFill(sx+w-9+(step?4:0),y+h-1,6,4,2,'#334155');
}

function drawSpiny(e,sx){
  if(!e.alive){
    ellipseFill(sx+e.w/2,e.y+e.h-3,e.w/2,3,C.RED);
    return;
  }
  const cx=sx+e.w/2, cy=e.y+e.h/2, r=e.w/2-2;
  // Spikes radiating from top half
  ctx.strokeStyle='#fca5a5';ctx.lineWidth=2;
  for(let i=0;i<5;i++){
    const angle=-Math.PI+i*(Math.PI/4);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r);
    ctx.lineTo(cx+Math.cos(angle)*(r+7),cy+Math.sin(angle)*(r+7));
    ctx.stroke();
  }
  // Round body
  const gs=ctx.createRadialGradient(cx-2,cy-2,1,cx,cy,r);
  gs.addColorStop(0,'#f87171');gs.addColorStop(1,'#991b1b');
  ellipseFill(cx,cy,r,r,C.RED);
  ctx.fillStyle=gs;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  // Eyes — angry white dots
  ellipseFill(cx-4,cy-2,2.5,2,C.BG);
  ellipseFill(cx+4,cy-2,2.5,2,C.BG);
  ellipseFill(cx-4,cy-2,1,1.5,'#fca5a5');
  ellipseFill(cx+4,cy-2,1,1.5,'#fca5a5');
}

function drawCheep(e,sx){
  if(!e.alive)return;
  const cx=sx+e.w/2, cy=e.y+e.h/2;
  // Body — ellipse
  const gc=ctx.createRadialGradient(cx-2,cy-2,1,cx,cy,e.w/2);
  gc.addColorStop(0,'#22d3ee');gc.addColorStop(1,'#0e7490');
  ctx.fillStyle=gc;
  ctx.beginPath();ctx.ellipse(cx+2,cy,e.w/2-1,e.h/2,0,0,Math.PI*2);ctx.fill();
  // Scales hint
  ctx.strokeStyle='rgba(34,211,238,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,e.w/4,0,Math.PI*2);ctx.stroke();
  // Eye
  ellipseFill(cx+5,cy-3,3,3,C.RED);
  ellipseFill(cx+5,cy-3,1.5,1.5,C.BG);
  // Tail fin — triangle
  ctx.fillStyle='#0e7490';
  ctx.beginPath();
  ctx.moveTo(sx+3,cy-6);ctx.lineTo(sx-8,cy);ctx.lineTo(sx+3,cy+6);
  ctx.closePath();ctx.fill();
  // Fin highlight
  ctx.fillStyle='rgba(34,211,238,0.4)';
  ctx.beginPath();ctx.moveTo(cx,cy-e.h/2+2);ctx.lineTo(cx+4,cy-3);ctx.lineTo(cx-4,cy-3);ctx.fill();
}

function drawBox(e,sx){
  if(e.animPhase===3){
    // Spent box — desaturated (critique: wrong answer shows "you can come back")
    ctx.fillStyle='#1e293b';ctx.fillRect(sx,e.y,T,T);
    ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.strokeRect(sx+0.5,e.y+0.5,T-1,T-1);
    ctx.fillStyle='#334155';ctx.font='bold 12px Inter';ctx.textAlign='center';
    ctx.textBaseline='middle';ctx.fillText('?',sx+T/2,e.y+T/2+1);
    return;
  }

  // Approach glow: amber outer ring when player is within 80px (critique §1 + §3)
  if(player&&!player.dead){
    const dist=Math.abs((player.x+player.w/2)-(e.x+T/2));
    if(dist<80&&!STATE.reducedMotion){
      const approachAlpha=Math.max(0,(80-dist)/80)*0.4;
      ctx.fillStyle=`rgba(251,191,36,${approachAlpha})`;
      ctx.fillRect(sx-4,e.y-4,T+8,T+8);
    }
  }

  if(!STATE.reducedMotion){
    const glowCol=e.animPhase===1?C.AMBER:C.CYAN_DIM;
    ctx.shadowColor=glowCol;ctx.shadowBlur=10*e.glowIntensity;
  }
  ctx.fillStyle=C.BG;ctx.fillRect(sx,e.y,T,T);
  // Box border — amber during flash phase, cyan normally
  ctx.strokeStyle=e.animPhase===1?C.AMBER:C.CYAN;
  ctx.lineWidth=e.animPhase===1?3:2;ctx.strokeRect(sx+0.5,e.y+0.5,T-1,T-1);
  // Top + bottom edge highlights
  ctx.fillStyle=e.animPhase===1?C.AMBER:C.CYAN;
  ctx.fillRect(sx,e.y,T,3);ctx.fillRect(sx,e.y+T-3,T,3);
  ctx.fillRect(sx,e.y,3,T);ctx.fillRect(sx+T-3,e.y,3,T);
  // "?" glyph — rotates during flash phase (anticipation cue)
  ctx.save();
  ctx.translate(sx+T/2,e.y+T/2);ctx.rotate(e.rotation||0);
  ctx.fillStyle=e.animPhase===1?C.WHITE:C.AMBER;
  ctx.font='bold 14px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(e.animPhase===1?'?!':'?',0,1);
  ctx.restore();ctx.shadowBlur=0;
}

function drawCoin(e,sx){
  // Round amber coin (ellipse)
  const scaleX=Math.abs(Math.cos(e.spinAngle));
  ctx.save();
  if(!STATE.reducedMotion){ctx.shadowColor=C.AMBER;ctx.shadowBlur=5;}
  ctx.fillStyle=C.COIN;
  ctx.beginPath();
  ctx.ellipse(sx+5,e.y+7,Math.max(1.5,5*scaleX),7,0,0,Math.PI*2);
  ctx.fill();
  // Shine
  if(scaleX>0.5){
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.beginPath();ctx.ellipse(sx+3,e.y+4,Math.max(0.5,2*scaleX),2.5,0,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;ctx.restore();
}

function drawMushroom(e,sx){
  // V3-spec: cyan cap, amber spots, white credential-key stalk, cyan glow aura
  const x=sx, y=e.y, w=e.w, h=e.h;
  // Glow aura
  if(!STATE.reducedMotion){
    ctx.fillStyle='rgba(34,211,238,0.18)';
    ctx.fillRect(x-4,y-4,w+8,h+8);
  }
  // Cyan dome cap (top half)
  ctx.fillStyle=C.CYAN;
  ctx.fillRect(x+3,y+2,w-6,4);    // cap top strip
  ctx.fillRect(x+1,y+6,w-2,6);    // cap mid band
  ctx.fillStyle=C.CYAN_DIM;
  ctx.fillRect(x+1,y+6,w-2,2);    // cap shadow line
  // Amber spots on cap (credential-hygiene badge)
  ctx.fillStyle=C.AMBER;
  ctx.fillRect(x+5, y+6, 4,4);    // left spot
  ctx.fillRect(x+w-9,y+6, 4,4);   // right spot
  ctx.fillRect(x+w/2-2,y+3,4,3);  // centre top spot
  // White stalk
  ctx.fillStyle=C.WHITE;
  ctx.fillRect(x+4,y+12,w-8,h-12);
  // Key icon on stalk (spec: "key icon, not eyes")
  ctx.fillStyle=C.CYAN_DIM;
  ctx.fillRect(x+w/2-3,y+14,6,5); // key head circle-ish
  ctx.fillRect(x+w/2-1,y+19,2,4); // key shaft
  ctx.fillRect(x+w/2+1,y+21,2,2); // key teeth right
  ctx.fillRect(x+w/2-3,y+21,2,2); // key teeth left
}

function drawFireFlower(e,sx){
  // V3-spec: amber petals (rect style), cyan core key, dark stem, pulsing amber glow
  const x=sx, y=e.y, w=e.w, h=e.h;
  const pulse=0.6+0.4*Math.sin(e.bobPhase||0);
  // Pulsing amber outer glow
  if(!STATE.reducedMotion){
    ctx.fillStyle=`rgba(251,191,36,${0.15+0.12*pulse})`;
    ctx.fillRect(x-6,y-6,w+12,h+12);
  }
  // Stem
  ctx.fillStyle=C.CYAN_DIM;
  ctx.fillRect(x+w/2-2,y+h*0.5,4,h*0.5);
  // Amber petals — 4 directions (rect-pixel art style, not arcs, matching V3)
  ctx.fillStyle=C.AMBER;
  ctx.fillRect(x+2, y,    w-4, 8);   // top petal
  ctx.fillRect(x+0, y+4,  4,  10);   // left petal
  ctx.fillRect(x+w-4,y+4, 4,  10);   // right petal
  ctx.fillRect(x+4, y+12, w-8, 6);   // bottom petal
  // Petal shade line
  ctx.fillStyle='#b45309';
  ctx.fillRect(x+2,y+6,w-4,2);
  // Cyan core — "the key" (V3 spec)
  ctx.fillStyle=C.CYAN;
  ctx.fillRect(x+w/2-4,y+5,8,8);
  // White shine pixel in core
  ctx.fillStyle=C.WHITE;
  ctx.fillRect(x+w/2-2,y+7,2,2);
  // Key shaft below core
  ctx.fillStyle=C.CYAN_DIM;
  ctx.fillRect(x+w/2-1,y+13,2,5);
}

function drawFireball(e,sx){
  ctx.fillStyle=C.RED;ctx.beginPath();ctx.arc(sx+5,e.y+5,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.AMBER;ctx.beginPath();ctx.arc(sx+5,e.y+5,2.5,0,Math.PI*2);ctx.fill();
}

function drawHeart(e,sx){
  ctx.fillStyle=C.RED;
  ctx.font='18px serif';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('♥',sx,e.y);
}

function drawBoss(e,sx){
  const bob=Math.sin(e.animFrame*0.5)*2;
  const stunned=e.stunTimer>0;
  const bx=sx, by=e.y+bob;

  // Phase 2 outer glow / aura
  if(e.phase===2){
    const pulseA=0.15+0.12*Math.sin(STATE.frame*0.15);
    ctx.fillStyle=`rgba(239,68,68,${pulseA})`;
    rrFill(bx-6,by-6,e.w+12,e.h+12,10,`rgba(239,68,68,${pulseA})`);
  }

  // Body — rounded rectangle with gradient
  const bossBg=stunned?'#64748b':C.BOSS;
  const gb=ctx.createLinearGradient(bx,by,bx+e.w,by+e.h);
  if(stunned){gb.addColorStop(0,'#7a8fa8');gb.addColorStop(1,'#475569');}
  else if(e.phase===2){gb.addColorStop(0,'#6b7280');gb.addColorStop(1,'#374151');}
  else{gb.addColorStop(0,'#5a6a7a');gb.addColorStop(1,'#2d3748');}
  rrFill(bx,by,e.w,e.h,8,bossBg);
  ctx.fillStyle=gb;roundRect(bx,by,e.w,e.h,8);ctx.fill();

  // Eyes — round, threatening
  const eyeColor=stunned?C.SLATE:C.RED;
  ellipseFill(bx+12,by+18,7,7,eyeColor);
  ellipseFill(bx+e.w-12,by+18,7,7,eyeColor);
  ellipseFill(bx+12,by+19,3,3,C.BG);
  ellipseFill(bx+e.w-12,by+19,3,3,C.BG);

  // Mouth — frown arc
  ctx.strokeStyle=stunned?C.SLATE:'#dc2626';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(bx+e.w/2,by+e.h*0.65,12,0.2,Math.PI-0.2);ctx.stroke();

  // "Password123" badge
  rrFill(bx+8,by+e.h-20,e.w-16,14,4,'rgba(0,0,0,0.5)');
  ctx.fillStyle=C.AMBER;ctx.font='bold 8px Inter';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Password123',bx+e.w/2,by+e.h-13);

  // HP bar — rounded
  rrFill(bx,by-16,e.w,8,4,'#1e293b');
  const hpColor=e.hp>e.maxHp/2?C.EMERALD:C.RED;
  const hpW=Math.max(0,e.w*(e.hp/e.maxHp));
  if(hpW>0)rrFill(bx,by-16,hpW,8,4,hpColor);

  // Phase 2 fireball hint (flashing)
  if(e.phase===2&&Math.floor(STATE.frame/45)%2===0){
    ctx.fillStyle=C.AMBER;ctx.font='bold 10px Inter';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText('🔥 USE FIREBALLS!',bx+e.w/2,by-20);
  }
}

function drawPaper(e,sx){
  ctx.save();ctx.translate(sx+5,e.y+5);ctx.rotate(e.animAngle);
  // Paper body
  ctx.fillStyle=C.WHITE;rrFill(-6,-6,12,12,2,C.WHITE);
  // Lines
  ctx.fillStyle=C.SLATE;for(let l=0;l<3;l++)ctx.fillRect(-4,-2+l*4,8,1);
  ctx.restore();
  // Credential label above paper (floats upright)
  if(e.cred){
    const tw=ctx.measureText(e.cred).width+8;
    rrFill(sx+5-tw/2,e.y-16,tw,12,3,'rgba(239,68,68,0.85)');
    ctx.fillStyle=C.WHITE;ctx.font='6px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.cred,sx+5,e.y-10);
  }
}

function drawFlagpole(e,sx,lv){
  // Pole
  ctx.fillStyle=C.SLATE;ctx.fillRect(sx+T/2-2,0,4,lv.h*T);
  // Flag
  ctx.fillStyle=C.CYAN;
  ctx.beginPath();ctx.moveTo(sx+T/2+2,10);ctx.lineTo(sx+T/2+20,18);ctx.lineTo(sx+T/2+2,26);ctx.fill();
  // Credential tier markers on pole
  const markerColors=[C.AMBER,C.EMERALD,C.CYAN];
  const labels=['PWD','MFA','KEY'];
  for(let i=0;i<3;i++){
    const my=50+i*80;
    ctx.fillStyle=markerColors[i];ctx.fillRect(sx+T/2-10,my,20,14);
    ctx.fillStyle=C.BG;ctx.font='bold 6px Inter';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(labels[i],sx+T/2,my+4);
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;
}

function drawCoachmark(){
  if(!coachmark||!coachmark.visible||coachmark.dismissed)return;
  const sx=coachmark.tx*T-camera.x;
  if(sx<-60||sx>canvas.width+60)return;
  ctx.fillStyle='rgba(251,191,36,0.95)';ctx.font='bold 10px Inter';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  const w=ctx.measureText(coachmark.text).width+14;
  ctx.fillRect(sx-w/2,coachmark.ty*T-22,w,18);
  ctx.fillStyle=C.BG;ctx.fillText(coachmark.text,sx,coachmark.ty*T-6);
}

// TRAINING SYSTEM — all 14 features

function addFloatText(text,x,y,color){
  STATE.tr.floatTexts.push({text,x,y,color:color||C.EMERALD,timer:80,maxTimer:80});
}

// ── Update all training timers each frame ────────────────────────────────────
function updateTraining(){
  const tr=STATE.tr;
  if(tr.missionTimer>0)tr.missionTimer--;
  if(tr.iqFlash&&--tr.iqFlash.timer<=0)tr.iqFlash=null;
  if(tr.powerupCard&&--tr.powerupCard.timer<=0)tr.powerupCard=null;
  if(tr.bossRevealTimer>0)tr.bossRevealTimer--;
  if(tr.scrollOverlay&&--tr.scrollOverlay.timer<=0)tr.scrollOverlay=null;
  if(tr.intelPanel&&--tr.intelPanel.timer<=0)tr.intelPanel=null;
  tr.floatTexts=tr.floatTexts.filter(f=>{f.y-=0.9;f.timer--;return f.timer>0;});
  // Enemy first-seen tooltips
  tr.enemyTooltips=tr.enemyTooltips.filter(t=>{t.timer--;return t.timer>0;});
  // Check for first-seen enemies (match against live entities on screen)
  if(player&&!player.dead){
    for(const e of entities){
      if(!['goomba','spiny','cheep','boss'].includes(e.type))continue;
      if(!e.alive)continue;
      const sx=e.x-camera.x;
      if(sx<-60||sx>canvas.width+60)continue;
      if(!tr.seenEnemies.has(e.type)){
        tr.seenEnemies.add(e.type);
        const lines=TR.enemyTip[e.type]||[];
        tr.enemyTooltips.push({type:e.type,x:e.x,y:e.y,timer:110,lines});
      }
    }
  }
  // Scroll collectibles update
  for(const s of tr.scrollEntities){
    if(s.collected)continue;
    s.bobPhase=(s.bobPhase||0)+0.07;
    s.y+=Math.sin(s.bobPhase)*0.3;
    if(player&&!player.dead){
      if(Math.abs(player.x+player.w/2-(s.x+12))<28&&Math.abs(player.y+player.h/2-(s.y+12))<28){
        s.collected=true;Audio.powerup(1);
        spawnParticles(s.x+12,s.y+12,C.AMBER,8);
        tr.scrollOverlay={text:s.fact,timer:180};
      }
    }
  }
  // Intel terminal proximity check
  const lv=STATE.currentLevel;
  const itx=lv&&TR.intelTx[lv.id];
  if(itx&&player&&!player.dead){
    const termX=itx*T;
    const nearTerm=Math.abs(player.x+player.w/2-termX)<40;
    if(nearTerm&&!tr.intelPanel)showIntelPanel(lv.id);
    if(!nearTerm&&tr.intelPanel&&tr.intelPanel.timer>30)tr.intelPanel.timer=30; // fast-fade when walking away
  }
  // Breach ticker scroll
  const tickerText=TR.ticker[tr.tickerIdx%TR.ticker.length]+'     ';
  tr.tickerPos-=1.1;
  if(tr.tickerPos<-(tickerText.length*6.5)){
    tr.tickerPos=canvas.width;
    tr.tickerIdx=(tr.tickerIdx+1)%TR.ticker.length;
  }
}

function showIntelPanel(levelId){
  const d=TR.intel[levelId];
  if(!d)return;
  STATE.tr.intelPanel={title:d.title,lines:d.lines,timer:240};
}

// ── Mission Card (auto-dismiss 3s, compact left-edge banner) ─────────────────
function drawMissionCard(){
  const t=STATE.tr.missionTimer;if(t<=0)return;
  const lv=STATE.currentLevel;const md=lv&&TR.mission[lv.id];if(!md)return;
  const alpha=t>50?1:t/50;
  const CW=320,CH=42,CX=8,CY=42;
  ctx.save();ctx.globalAlpha=alpha;
  rrFill(CX,CY,CW,CH,6,'rgba(2,6,23,0.90)');
  ctx.strokeStyle='rgba(34,211,238,0.4)';ctx.lineWidth=1;roundRect(CX,CY,CW,CH,6);ctx.stroke();
  rrFill(CX,CY,3,CH,6,C.CYAN);
  ctx.fillStyle=C.CYAN;ctx.font='bold 9px Inter';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(md.topic,CX+10,CY+7);
  ctx.fillStyle='rgba(148,163,184,0.9)';ctx.font='9px Inter';ctx.textBaseline='top';
  // Truncate body to ~45 chars
  const body=md.body.length>52?md.body.slice(0,50)+'…':md.body;
  ctx.fillText(body,CX+10,CY+22);
  ctx.restore();
}

// ── Breach Ticker (bottom strip) ──────────────────────────────────────────────
function drawBreachTicker(){
  const tr=STATE.tr;
  const stripH=14;const stripY=canvas.height-stripH;
  ctx.fillStyle='rgba(2,6,23,0.82)';ctx.fillRect(0,stripY,canvas.width,stripH);
  ctx.strokeStyle='rgba(34,211,238,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,stripY);ctx.lineTo(canvas.width,stripY);ctx.stroke();
  // Label
  rrFill(0,stripY,64,stripH,0,`rgba(34,211,238,0.18)`);
  ctx.fillStyle=C.CYAN;ctx.font='bold 8px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('THREAT INTEL',32,stripY+stripH/2);
  // Scrolling text
  ctx.save();ctx.rect(65,stripY,canvas.width-65,stripH);ctx.clip();
  const tickerText=TR.ticker[tr.tickerIdx%TR.ticker.length];
  ctx.fillStyle='rgba(148,163,184,0.9)';ctx.font='8px Inter';ctx.textAlign='left';
  ctx.fillText(tickerText,tr.tickerPos,stripY+stripH/2);
  ctx.restore();
}

// ── Enemy First-Seen Tooltips ──────────────────────────────────────────────────
function drawEnemyTooltips(){
  for(const tt of STATE.tr.enemyTooltips){
    if(tt.timer<=0)continue;
    const alpha=Math.min(1,tt.timer/20,1-(110-tt.timer<0?0:(110-tt.timer)/20));
    const sx=tt.x-camera.x;
    if(sx<-100||sx>canvas.width+100)continue;
    const maxW=140,lineH=11,pad=6;
    const TH=pad+tt.lines.length*lineH+pad;
    const TX=Math.max(4,Math.min(sx-maxW/2,canvas.width-maxW-4));
    const TY=tt.y-TH-10;
    ctx.save();ctx.globalAlpha=alpha;
    rrFill(TX,TY,maxW,TH,6,'rgba(2,6,23,0.92)');
    ctx.strokeStyle=C.AMBER;ctx.lineWidth=1.2;roundRect(TX,TY,maxW,TH,6);ctx.stroke();
    tt.lines.forEach((line,i)=>{
      const isTitle=i===0;
      ctx.fillStyle=isTitle?C.AMBER:C.SLATE;
      ctx.font=isTitle?'bold 8px Inter':'8px Inter';
      ctx.textAlign='left';ctx.textBaseline='top';
      ctx.fillText(line,TX+pad,TY+pad+i*lineH);
    });
    // Arrow pointer down

// ─── QUIZ OVERLAY ─────────────────────────────────────────────────────────────
function drawQuizOverlay(){
  if(!STATE.quizActive)return;
  const q=STATE.quizActive,qd=q.quiz;

  // Dimmed backdrop with subtle blur effect
  ctx.fillStyle='rgba(2,6,23,0.90)';ctx.fillRect(0,0,canvas.width,canvas.height);

  const CX=44,CY=42,CW=712,CH=396;

  // Card body
  roundRect(CX,CY,CW,CH,R);ctx.fillStyle='#0d1829';ctx.fill();

  // Card border
  ctx.strokeStyle=q.wrongAnim>0?`rgba(239,68,68,${0.5+0.5*(q.wrongAnim/90)})`:'rgba(34,211,238,0.40)';

  ctx.lineTo(CX+CW,CY+46);ctx.lineTo(CX,CY+46);ctx.lineTo(CX,CY+R);ctx.arcTo(CX,CY,CX+R,CY,R);

        btnGrad.addColorStop(0,'rgba(30,58,92,0.60)');
        btnGrad.addColorStop(1,'rgba(15,23,42,0.80)');
      }
      ctx.fillStyle=btnGrad;ctx.fill();
      ctx.strokeStyle=hover?C.CYAN:'rgba(51,65,85,0.7)';ctx.lineWidth=hover?1.5:1;ctx.stroke();

      // Number badge pill
      roundRect(bx+8,by+10,26,24,6);
      ctx.fillStyle=hover?C.AMBER:'rgba(251,191,36,0.80)';ctx.fill();
      ctx.fillStyle=C.BG;ctx.font='bold 12px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(String(i+1),bx+21,by+22);

      // Option text
      ctx.fillStyle=hover?C.CYAN:C.WHITE;ctx.font=hover?'bold 13px Inter':'13px Inter';
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(opt,bx+44,by+22);
    });

    ctx.fillText(resultLabel,CX+CW/2,optY+19);

    // Explanation
    ctx.fillStyle=C.WHITE;ctx.font='13px Inter';ctx.textBaseline='top';
    const expLines=wrapText(qd.explain,CW-80);

    const BW=180,BH=42,BX=CX+(CW-BW)/2,BY=CY+CH-62;

    const btnG=ctx.createLinearGradient(BX,BY,BX+BW,BY+BH);
    btnG.addColorStop(0,`rgba(34,211,238,${pulse})`);

    ctx.fillStyle=btnG;ctx.fill();
    ctx.strokeStyle=C.WHITE+'44';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=C.BG;ctx.font='bold 14px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Continue  ▶',BX+BW/2,BY+BH/2);

    STATE._quizContinueRect={x:BX,y:BY,w:BW,h:BH};
  }
}


function wrapText(text,maxW){
  ctx.font='bold 15px Inter'; // measure font
  const words=text.split(' '),lines=[];let line='';
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w;}
    else line=test;
  }
  if(line)lines.push(line);
  return lines;
}

// ─── CLICK HANDLER ────────────────────────────────────────────────────────────
canvas.addEventListener('click',ev=>{
  // Dismiss castle entry tip first (before any other click handling)
  if(STATE.entryTipActive){STATE.entryTipActive=false;return;}
  // Title/gameover/levelcomplete — click to advance
  if(STATE.screen==='title'){Audio.init();BGM.setMuted(Audio.isMuted());STATE.screen='worldselect';return;}
  const rect=canvas.getBoundingClientRect();
  const mx=(ev.clientX-rect.left)*(canvas.width/rect.width);
  const my=(ev.clientY-rect.top)*(canvas.height/rect.height);

  if(STATE.screen==='quiz'&&STATE.quizActive){
    const q=STATE.quizActive,qd=q.quiz;
    if(q.answered&&STATE._quizContinueRect){
      const r=STATE._quizContinueRect;
      if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){dismissQuiz();return;}
    }
    if(!q.answered){
      // Click on options
      ctx.font='bold 15px Inter';
      const lines=wrapText(qd.q,700-50);
      const optY=55+32+lines.length*20+14;
      qd.opts.forEach((_,i)=>{
        const by=optY+i*56;
        if(mx>=50+20&&mx<=50+700-20&&my>=by&&my<=by+46)handleQuizAnswer(i);
      });
    }
  }
});

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function gameUpdate(){
  STATE.frame++;
  const scr=STATE.screen;

  if(scr==='title'){
    if(Keys.pressed('Space')){Audio.init();BGM.setMuted(Audio.isMuted());STATE.screen='worldselect';}
  } else if(scr==='worldselect'){
    if(Keys.pressed('ArrowLeft'))STATE.worldSelectIndex=Math.max(0,STATE.worldSelectIndex-1);
    if(Keys.pressed('ArrowRight'))STATE.worldSelectIndex=Math.min(5,STATE.worldSelectIndex+1);
    if(Keys.pressed('ArrowUp'))STATE.worldSelectIndex=Math.max(0,STATE.worldSelectIndex-3);
    if(Keys.pressed('ArrowDown'))STATE.worldSelectIndex=Math.min(5,STATE.worldSelectIndex+3);
    if(Keys.pressed('Space')||Keys.pressed('Enter')){
      const wi=STATE.worldSelectIndex;
      if(!STATE.worldsUnlocked[wi]){
        showMsg('Beat the castle of the previous world to unlock this!',C.RED,180);
      } else {
      STATE.world=wi+1;STATE.level=1;
      STATE.lives=3;STATE.score=0;STATE.coins=0;STATE.powerup=0;
      loadLevel(STATE.world,STATE.level);
      emitEvent('session.started',{world:STATE.world});
      } // end else (world unlocked)
    }
    if(Keys.pressed('Escape'))STATE.screen='title';
  } else if(scr==='game'){
    const lv=STATE.currentLevel;
    updateTraining();
    // Castle entry tip dismiss — Space/Enter clears it before normal input
    if(STATE.entryTipActive&&(Keys.pressed('Space')||Keys.pressed('Enter'))){STATE.entryTipActive=false;}
    if(Keys.pressed('Escape')){STATE.screen='pause';STATE.pauseSelectedItem=0;}
    if(Keys.pressed('KeyM'))Audio.toggle();
    if(Keys.pressed('KeyR')){STATE.lives=3;STATE.powerup=0;BGM.stop();loadLevel(STATE.world,STATE.level);}
    updatePlayer(lv);
    updateEntities(lv);

  } else if(scr==='boxanim'){
    // Box flash/pause animation playing — world is FROZEN (enemies can't move/damage)
    // Only the box animation and particles update; player is safe
    const lv=STATE.currentLevel;
    for(const e of entities) if(e.type==='box') updateBox(e,lv);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
      if(p.life<=0)particles.splice(i,1);
    }

  } else if(scr==='quiz'){
    const q=STATE.quizActive;
    if(!q){STATE.screen='game';return;}
    for(let i=0;i<4;i++)if(Keys.pressed(`Digit${i+1}`))handleQuizAnswer(i);
    if(q.answered&&(Keys.pressed('Space')||Keys.pressed('Enter')||Keys.pressed('Escape')))dismissQuiz();
    // No timer — quiz stays open until the player answers (better for learning, per spec)
    if(q.wrongAnim>0)q.wrongAnim--;
  } else if(scr==='pause'){
    if(Keys.pressed('Escape'))STATE.screen='game';
    if(Keys.pressed('KeyR')){STATE.lives=3;STATE.powerup=0;BGM.stop();loadLevel(STATE.world,STATE.level);}
    if(Keys.pressed('ArrowUp'))STATE.pauseSelectedItem=Math.max(0,STATE.pauseSelectedItem-1);
    if(Keys.pressed('ArrowDown'))STATE.pauseSelectedItem=Math.min(3,STATE.pauseSelectedItem+1);
    if(Keys.pressed('Space')||Keys.pressed('Enter')){
      if(STATE.pauseSelectedItem===0){STATE.screen='game';}
      else if(STATE.pauseSelectedItem===1){STATE.powerup=0;loadLevel(STATE.world,STATE.level);}
      else if(STATE.pauseSelectedItem===2){Audio.toggle();}
      else if(STATE.pauseSelectedItem===3){BGM.stop();STATE.screen='worldselect';}
    }
  } else if(scr==='levelcomplete'){
    if(Keys.just.size>0||STATE.frame%200===0){
      const lv=STATE.currentLevel;
      if(lv.hasBoss||lv.level===5){
        STATE.worldsUnlocked[STATE.world]=true;
        if(STATE.world>=5){STATE.screen='victory';emitEvent('session.completed',{score:STATE.score});}
        else{BGM.stop();STATE.screen='worldselect';}
      } else {
        STATE.level++;loadLevel(STATE.world,STATE.level);
      }
    }
  } else if(scr==='gameover'){
    if(Keys.pressed('KeyR')){STATE.lives=3;STATE.powerup=0;BGM.stop();loadLevel(STATE.world,STATE.level);}
    if(Keys.pressed('Escape')){BGM.stop();STATE.screen='worldselect';}
  } else if(scr==='victory'){
    if(Keys.pressed('Space')){
      STATE.world=1;STATE.level=1;STATE.lives=3;STATE.score=0;STATE.coins=0;STATE.powerup=0;
      BGM.stop();STATE.screen='worldselect';
      emitEvent('session.started',{world:1,restart:true});
    }
  }

  Keys.flush();
}

function gameDraw(){
  const scr=STATE.screen;
  if(scr==='title'){drawTitle();return;}
  if(scr==='worldselect'){drawWorldSelect();return;}
  if(scr==='gameover'){drawGameOver();return;}
  if(scr==='victory'){drawVictory();return;}

  // In-game screens
  if(STATE.currentLevel){
    const lv=STATE.currentLevel;
    cls();
    drawParallax();
    drawLevelBackground(lv);
    drawLevel(lv);
    drawEntities(lv);
    drawPlayer();
    drawParticles();
    drawCoachmark();
    drawFloatTexts();
    drawHUD();
    drawBreachTicker();
    drawMissionCard();
    drawEnemyTooltips();
    drawPowerupCard();
    drawIQFlash();
    drawScrollOverlay();
    if(STATE.tr.intelPanel)drawIntelPanel();
    if(STATE.tr.bossRevealTimer>0)drawBossReveal();
    if(STATE.entryTipActive)drawEntryTip();
    if(scr==='quiz')drawQuizOverlay();
    if(scr==='boxanim'){
      // Subtle dim during box animation to focus attention on box
      ctx.fillStyle='rgba(2,6,23,0.25)';ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    if(scr==='pause')drawPauseMenu();
    if(scr==='levelcomplete')drawLevelComplete();
  } else {
    cls();
  }
}

function loop(){
  gameUpdate();
  gameDraw();
  requestAnimationFrame(loop);
}

// Boot
requestAnimationFrame(loop);
document.getElementById('gameCanvas').focus();
</script>
</body>
</html>
