// ─── AUDIO SFX ───────────────────────────────────────────────────────────────
const Audio = (()=>{
  let ac=null, muted=false;
  function init(){
    if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
    if(ac.state==='suspended') ac.resume();
  }
  function tone(freq,type='sine',vol=0.3,dur=0.1,delay=0){
    if(muted||!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }
  function chord(freqs,type='sine',vol=0.18,dur=0.15){
    freqs.forEach((f,i)=>tone(f,type,vol,dur,i*0.05));
  }
  return{
    init, get ctx(){return ac;},
    toggle(){muted=!muted;BGM.setMuted(muted);return muted;},
    isMuted(){return muted;},
    jump(hold){init();tone(hold?440:330,'square',0.18,0.12);if(hold)tone(550,'square',0.08,0.08,0.06);},
    coin(){init();tone(880,'sine',0.25,0.08);tone(1320,'sine',0.18,0.06,0.05);},
    stomp(){init();tone(150,'square',0.35,0.1);tone(80,'square',0.25,0.05,0.05);},
    hit(){init();tone(220,'sawtooth',0.35,0.15);tone(110,'sawtooth',0.25,0.1,0.08);},
    powerup(tier){
      init();
      const seqs=[[523,659,784,1047],[784,1047,1319],[1047,1319,1568],[659,784,1047,1319],[523,659,784,1047,1319]];
      chord(seqs[Math.min(tier,4)],'sine',0.22,0.12);
    },
    quizCorrect(){init();chord([523,659,784,1047],'sine',0.18,0.15);},
    quizWrong(){init();tone(330,'sawtooth',0.28,0.1);tone(220,'sawtooth',0.22,0.1,0.1);tone(165,'sawtooth',0.18,0.15,0.2);},
    bossHit(){init();tone(110,'sawtooth',0.45,0.25);tone(87,'sawtooth',0.35,0.25,0.12);},
    levelComplete(){init();chord([523,659,784,1047,1319],'sine',0.18,0.2);tone(1568,'sine',0.25,0.4,0.3);},
    enemyFire(){init();tone(600,'sawtooth',0.18,0.06);tone(400,'sawtooth',0.12,0.04,0.04);}
  };
})();

// ─── BACKGROUND MUSIC ────────────────────────────────────────────────────────
const BGM = (()=>{
  let ac=null, masterGain=null, playing=false, theme=null;
  let stepIdx=0, nextTime=0, schedTimer=null, muted=false;

  const THEMES = {
    plains:{bpm:140,vol:0.055,
      notes:[523,659,784,659,523,392,440,523,587,523,440,392],
      dur:  [0.25,0.25,0.5,0.25,0.25,0.5,0.25,0.5,0.25,0.25,0.25,0.5]},
    cave:{bpm:108,vol:0.045,
      notes:[392,370,349,330,349,392,392,392,330,294],
      dur:  [0.5,0.25,0.25,0.5,0.5,0.25,0.25,0.5,0.5,1.0]},
    water:{bpm:116,vol:0.05,
      notes:[523,587,659,698,784,698,659,587,523,494,523,587],
      dur:  [0.25,0.25,0.25,0.25,0.5,0.25,0.25,0.5,0.25,0.25,0.25,0.5]},
    castle:{bpm:96,vol:0.055,
      notes:[220,233,220,196,220,196,175,165,175,196,220,246],
      dur:  [0.5,0.25,0.25,0.5,0.25,0.25,0.5,0.5,0.25,0.25,0.5,1.0]},
    boss:{bpm:128,vol:0.06,
      notes:[330,349,330,311,330,311,294,277,294,311,330,370],
      dur:  [0.25,0.25,0.5,0.25,0.25,0.5,0.25,0.5,0.25,0.25,0.5,0.5]}
  };

  function ensure(){
    if(!Audio.ctx) Audio.init();
    ac = Audio.ctx;
    if(!masterGain){
      masterGain=ac.createGain();
      masterGain.gain.value=0;
      masterGain.connect(ac.destination);
    }
  }

  function scheduleNote(freq,time,dur,vol){
    if(!ac||muted)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(masterGain);
    o.type='triangle';
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol,time);
    g.gain.exponentialRampToValueAtTime(0.0001,time+dur*0.85);
    o.start(time);o.stop(time+dur);
  }

  function tick(){
    if(!playing||!theme||!ac)return;
    const AHEAD=0.12;
    const t=THEMES[theme];
    const beatDur=60/t.bpm;
    while(nextTime < ac.currentTime+AHEAD){
      const idx=stepIdx%t.notes.length;
      const dur=beatDur*t.dur[idx];
      scheduleNote(t.notes[idx],nextTime,dur,t.vol);
      // Bass note every 4 steps
      if(idx%4===0) scheduleNote(t.notes[idx]/2,nextTime,dur*0.8,t.vol*0.5);
      nextTime+=dur;
      stepIdx++;
    }
    schedTimer=setTimeout(tick,50);
  }

  return{
    start(themeName){
      if(playing&&theme===themeName)return;
      this.stop();
      ensure();
      theme=themeName||'plains';
      playing=true;stepIdx=0;
      nextTime=ac.currentTime+0.15;
      masterGain.gain.cancelScheduledValues(ac.currentTime);
      masterGain.gain.setValueAtTime(muted?0:1,ac.currentTime);
      tick();
    },
    stop(){
      playing=false;theme=null;
      if(schedTimer){clearTimeout(schedTimer);schedTimer=null;}
    },
    setMuted(m){
      muted=m;
      if(masterGain&&ac){
        masterGain.gain.cancelScheduledValues(ac.currentTime);
        masterGain.gain.setValueAtTime(m?0:1,ac.currentTime);
      }
    }
  };
})();

// ─── INPUT ───────────────────────────────────────────────────────────────────
const Keys={
  held:new Set(),just:new Set(),just_up:new Set(),
  down(e){
    const k=e.code;
    if(!Keys.held.has(k))Keys.just.add(k);
    Keys.held.add(k);
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k))e.preventDefault();
  },
  up(e){Keys.held.delete(e.code);Keys.just_up.add(e.code);},
  flush(){Keys.just.clear();Keys.just_up.clear();},
  is(k){return Keys.held.has(k);},
  pressed(k){return Keys.just.has(k);},
};
window.addEventListener('keydown',Keys.down,{passive:false});
window.addEventListener('keyup',Keys.up);

function makeTileGrid(rows,cols){return Array.from({length:rows},()=>new Uint8Array(cols));}
function isSolid(t){return t===1||t===2||t===3||t===4||t===8;}
function isLethal(t){return t===9;}
function isWater(t){return t===7;}

    w:W,h:H,tiles,enemies,boxes,coins,
    flagpole:null,
    bossSpawn:{tx:85,ty:H-2},
    checkpoint:{tx:55,ty:H-2},
    spawn:{tx:3,ty:H-2},
    bgColor:'#0a0a0f',music:'castle',hasBoss:true
  };
}

function buildScaffold(worldNum,levelNum){
  const W=100,H=15;
  const tiles=makeTileGrid(H,W);
  for(let x=0;x<W;x++)tiles[H-1][x]=1;
  for(let x=15;x<=22;x++)tiles[H-5][x]=2;
  for(let x=35;x<=42;x++)tiles[H-7][x]=2;
  for(let x=55;x<=62;x++)tiles[H-5][x]=2;
  const wColors=['#020617','#0a1628','#0a1a0a','#1a0a0a','#0f0f1a'];
  const wEnemies=[['goomba'],['goomba','spiny'],['goomba','cheep'],['goomba','spiny'],['goomba','spiny']];
  const qKeys=Object.keys(QUIZZES);
  return{
    id:`${worldNum}-${levelNum}`,name:`World ${worldNum}-${levelNum === 99 ? 'Castle' : levelNum}`,
    world:worldNum,level:levelNum===99?5:levelNum,
    w:W,h:H,tiles,
    enemies:[{type:wEnemies[worldNum-1][0],tx:20,ty:H-2}],
    boxes:[{tx:30,ty:H-4,quiz:qKeys[(worldNum*3+levelNum)%qKeys.length],reward:'coins5'}],
    coins:[...Array(16)].map((_,i)=>({tx:5+i*5,ty:H-3})),
    flagpole:{tx:W-5,ty:0},checkpoint:{tx:50,ty:H-2},
    spawn:{tx:3,ty:H-2},bgColor:wColors[worldNum-1],
    music:['plains','cave','water','castle','boss'][worldNum-1]||'plains',
    scaffold:true,hasBoss:levelNum===99
  };
}

const ALL_LEVELS=(()=>{
  const lvls=[buildLevel1_1(),buildLevel1_2(),buildLevel1_3(),buildLevel1_4(),buildLevel1_Castle()];
  for(let w=2;w<=5;w++){
    for(let l=1;l<=3;l++)lvls.push(buildScaffold(w,l));
    lvls.push(buildScaffold(w,99));
  }
  return lvls;
})();
function getLevel(world,level){return ALL_LEVELS.find(l=>l.world===world&&l.level===level)||ALL_LEVELS[0];}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
const STATE={
  screen:'title',
  world:1,level:1,
  lives:3,score:0,coins:0,
  powerup:0, // 0=tiny,1=strong,2=flame,3=cape,4=star,5=crown
  starTimer:0,
  currentLevel:null,
  quizActive:null,
  pauseSelectedItem:0,
  worldSelectIndex:0,
  frame:0,
  reducedMotion:window.matchMedia('(prefers-reduced-motion:reduce)').matches,
  worldsUnlocked:[true,true,true,true,true,true], // ALL UNLOCKED for dev/testing
};

// ─── ENTITY FACTORIES ────────────────────────────────────────────────────────
let player=null, entities=[], particles=[], camera={x:0}, coachmark=null;

function makePlayer(tx,ty){
  // FIX: y = ty*T - PH places feet AT top of tile ty (not inside it)
  return{
    x:tx*T, y:ty*T-PH,
    w:PW, h:PH,
    vx:0,vy:0,
    onGround:false,
    jumpBoostFrames:0,
    runTimer:0,
    invuln:0,
    facing:1,
    dead:false,
    deathTimer:0,
    lastCheckpoint:{x:tx*T,y:ty*T-PH},
    animFrame:0,animTimer:0,
    fireballs:[],fireballCooldown:0
  };
}

function makeEnemy(type,tx,ty){
  const EW=28,EH=28;
  return{
    type,
    x:tx*T, y:ty*T-EH,  // place on top of spawn tile
    w:EW,h:EH,
    vx:type==='spiny'?-1.4:-1.0,
    vy:0,onGround:false,alive:true,
    stompable:type!=='spiny',
    fireHits:type==='spiny'?3:1,
    fireHitCount:0,
    stomped:false,stompTimer:0,
    leapTimer:type==='cheep'?(Math.random()*60+60)|0:0,
    inWater:type==='cheep',
    waterY:ty*T-EH,
    animFrame:0,animTimer:0,
    graceFrames:GRACE_FRAMES,
    hp:type==='hammer_bro'?3:1,
  };
}

function makeMysteryBox(tx,ty,quiz,reward){
  return{type:'box',x:tx*T,y:ty*T,w:T,h:T,quiz,reward,
    hit:false,animPhase:0,animTimer:0,rotation:0,glowIntensity:0};
}

function makeCoin(tx,ty,underwater){
  return{type:'coin',x:tx*T+T/2-5,y:ty*T+4,w:10,h:14,
    collected:false,underwater:underwater||false,spinAngle:Math.random()*Math.PI*2};
}

function makeMushroom(x,y){
  return{type:'mushroom',x,y:y-T,w:28,h:28,vy:0,vx:0,
    emerging:true,targetY:y-T-T,onGround:false,collected:false};
}

function makeFireFlower(x,y){
  return{type:'fireflower',x,y:y-T,w:24,h:28,
    emerging:true,targetY:y-T-T,collected:false,bobPhase:0};
}

function makeFireball(x,y,dir){
  return{type:'fireball',x,y,w:10,h:10,vx:dir*9,vy:-2.5,alive:true,bounces:0};
}

function makeHeart(x,y){
  return{type:'heart',x,y,w:T,h:T,vy:-3,vx:(Math.random()-0.5)*2,collected:false,age:0};
}

function makeBoss(x,y){
  return{
    type:'boss',id:'reuser',
    x, y:y-72,
    w:56,h:72,
    vx:-1.6,vy:0,onGround:false,
    hp:8,maxHp:8,phase:1,
    throwTimer:80,papers:[],stunTimer:0,alive:true,
    knowledgeGateShown:false,knowledgeGatePassed:false,
    animFrame:0,animTimer:0
  };
}

function makeParticle(x,y,color,vx,vy,life){return{x,y,vx,vy,color,life,maxLife:life};}
function spawnParticles(x,y,color,count=6){
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2;
    particles.push(makeParticle(x,y,color,Math.cos(a)*3,Math.sin(a)*3-2,22));
  }
}

// ─── LEVEL LOADING ────────────────────────────────────────────────────────────
function loadLevel(world,level){
  const lv=getLevel(world,level);
  STATE.currentLevel=lv;
  entities=[];particles=[];
  camera={x:0};

  player=makePlayer(lv.spawn.tx,lv.spawn.ty);
  player.lastCheckpoint={x:player.x,y:player.y}; // use corrected position

  for(const e of lv.enemies) entities.push(makeEnemy(e.type,e.tx,e.ty));
  for(const b of lv.boxes)   entities.push(makeMysteryBox(b.tx,b.ty,b.quiz,b.reward));
  for(const c of lv.coins)   entities.push(makeCoin(c.tx,c.ty,c.underwater));
  if(lv.flagpole) entities.push({type:'flagpole',x:lv.flagpole.tx*T,y:0,w:T,h:lv.h*T});
  if(lv.hasBoss){
    const b=lv.bossSpawn;
    entities.push(makeBoss(b.tx*T,b.ty*T));
  }
  coachmark=lv.coachmark?{...lv.coachmark,visible:true,dismissed:false}:null;

  STATE.screen='game';
  BGM.start(lv.music||'plains');
  emitEvent('wave.started',{world,level});
}

// ─── COLLISION HELPERS ───────────────────────────────────────────────────────
function getTile(lv,tx,ty){
  if(tx<0||ty<0||tx>=lv.w||ty>=lv.h) return(ty>=lv.h)?0:1;
  return lv.tiles[ty][tx];
}

function rectRect(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// FIX: resolveY — removed overly-strict velocity condition that caused fall-through
function resolveY(ent,lv){
  const margin=1;
  const left=Math.floor((ent.x+margin)/T);
  const right=Math.floor((ent.x+ent.w-margin-1)/T);

  if(ent.vy>=0){
    // Check foot tiles — both rounded variants for robustness
    const ty1=Math.floor((ent.y+ent.h)/T);
    const ty2=Math.floor((ent.y+ent.h-1)/T);
    for(const ty of[ty1,ty2]){
      for(const tx of[left,right]){
        const tile=getTile(lv,tx,ty);
        if(isSolid(tile)&&ent.y+ent.h>ty*T){
          ent.y=ty*T-ent.h;
          return'floor';
        }
      }
    }
  } else {
    // Rising: check head
    const ty=Math.floor(ent.y/T);
    for(const tx of[left,right]){
      if(isSolid(getTile(lv,tx,ty))&&ent.y<(ty+1)*T){
        ent.y=(ty+1)*T;
        return'ceil';
      }
    }
  }
  return null;
}

function resolveX(ent,lv){
  const margin=1;
  const left=Math.floor((ent.x+margin)/T);
  const right=Math.floor((ent.x+ent.w-margin-1)/T);
  const top=Math.floor((ent.y+margin)/T);
  const bot=Math.floor((ent.y+ent.h-1)/T);
  let hit=false;
  for(let ty=top;ty<=bot;ty++){
    for(const tx of[left,right]){
      if(isSolid(getTile(lv,tx,ty))){
        if(ent.vx>0)ent.x=tx*T-ent.w;
        else if(ent.vx<0)ent.x=(tx+1)*T;
        hit=true;
      }
    }
  }
  return hit;
}

function moveEntity(ent,lv){
  const dx=ent.vx/MOVE_STEPS;
  for(let s=0;s<MOVE_STEPS;s++){
    ent.x+=dx;
    if(resolveX(ent,lv)){ent.vx=0;break;}
  }
  ent.onGround=false;
  const dy=ent.vy/MOVE_STEPS;
  for(let s=0;s<MOVE_STEPS;s++){
    ent.y+=dy;
    const hit=resolveY(ent,lv);
    if(hit==='floor'){ent.vy=0;ent.onGround=true;break;}
    if(hit==='ceil'){ent.vy=Math.max(ent.vy,0);break;}
  }
}

function isInWater(ent,lv){
  return isWater(getTile(lv,Math.floor((ent.x+ent.w/2)/T),Math.floor((ent.y+ent.h/2)/T)));
}

// ─── PLAYER UPDATE ────────────────────────────────────────────────────────────
function updatePlayer(lv){
  if(!player||player.dead){
    if(player&&player.dead){
      player.deathTimer--;
      player.vy+=GRAVITY;
      player.y+=player.vy;
      if(player.deathTimer<=0)respawnPlayer(lv);
    }
    return;
  }
  const p=player;
  const left=Keys.is('ArrowLeft'),right=Keys.is('ArrowRight');
  const jumpHeld=Keys.is('Space')||Keys.is('ArrowUp');
  const jumpPressed=Keys.pressed('Space')||Keys.pressed('ArrowUp');

  // Run timer
  if(left||right)p.runTimer=Math.min(p.runTimer+1,20);else p.runTimer=0;
  const running=p.runTimer>18;
  const maxSpd=running?RUN_SPEED:MAX_SPEED;

  // Horizontal
  if(left){p.vx-=ACCEL;p.facing=-1;}
  else if(right){p.vx+=ACCEL;p.facing=1;}
  else{p.vx*=FRICTION;if(Math.abs(p.vx)<0.1)p.vx=0;}
  p.vx=Math.max(-maxSpd,Math.min(maxSpd,p.vx));

  // Jump
  if(jumpPressed&&p.onGround){
    p.vy=JUMP_VY;
    p.jumpBoostFrames=BOOST_FRAMES;
    Audio.jump(jumpHeld);
  }
  if(p.jumpBoostFrames>0&&jumpHeld&&p.vy<0){
    p.vy+=BOOST_PER_F;
    p.jumpBoostFrames--;
  } else if(!jumpHeld){
    p.jumpBoostFrames=0;
  }
  // Cape glide
  if(STATE.powerup===3&&!p.onGround&&jumpHeld&&p.vy>0)p.vy=Math.min(p.vy,1.5);

  // Gravity
  p.vy+=GRAVITY;
  p.vy=Math.min(p.vy,14);

  moveEntity(p,lv);

  // Pit/lava death
  const cx=Math.floor((p.x+p.w/2)/T),cy=Math.floor((p.y+p.h-1)/T);
  if(isLethal(getTile(lv,cx,cy))||p.y>lv.h*T+80){killPlayer(lv);return;}

  // Water
  if(isInWater(p,lv)){p.vx*=0.85;p.vy*=0.88;if(p.vy>2)p.vy=2;}

  // FIX: Bi-directional camera (no left-lock) so players can backtrack to quiz boxes
  const targetCam=p.x-200;
  camera.x=Math.max(0,Math.min(targetCam,(lv.w-26)*T));

  if(p.invuln>0)p.invuln--;
  if(STATE.starTimer>0){STATE.starTimer--;if(STATE.starTimer===0)STATE.powerup=Math.max(0,STATE.powerup-1);}

  // Fireball
  if(p.fireballCooldown>0)p.fireballCooldown--;
  if(Keys.pressed('KeyZ')&&STATE.powerup>=2&&p.fireballCooldown===0){
    entities.push(makeFireball(p.x+(p.facing>0?p.w:0),p.y+p.h/2,p.facing));
    p.fireballCooldown=18;
    Audio.enemyFire();
  }

  // Checkpoint
  if(lv.checkpoint){
    const cpx=lv.checkpoint.tx*T,cpy=lv.checkpoint.ty*T-PH;
    if(Math.abs(p.x-cpx)<T*2&&p.y>cpy-T*2)p.lastCheckpoint={x:cpx,y:cpy};
  }

  p.animTimer++;
  if(p.animTimer>8){p.animTimer=0;p.animFrame=(p.animFrame+1)%4;}
}

function killPlayer(lv){
  if(!player||player.invuln>0)return;
  // Classic Mario: powerup cushions one hit
  if(STATE.powerup>0){
    STATE.powerup--;
    player.invuln=INVULN_FRAMES;
    Audio.hit();
    spawnParticles(player.x+player.w/2,player.y+player.h/2,C.RED,8);
    return;
  }
  // Tiny hit — lose a life
  player.dead=true;
  player.deathTimer=80;
  player.vy=-10;
  Audio.hit();
  STATE.lives--;
  emitEvent('lives.changed',{lives:STATE.lives});
}

function respawnPlayer(lv){
  if(STATE.lives<=0){
    STATE.screen='gameover';
    BGM.stop();
    emitEvent('session.abandoned',{world:STATE.world,level:STATE.level});
    return;
  }
  const cp=player.lastCheckpoint;
  player=makePlayer(0,0);
  player.x=cp.x;
  player.y=cp.y;
  player.lastCheckpoint={...cp};
  STATE.powerup=0;
  player.invuln=INVULN_FRAMES; // brief grace on respawn
}

// ─── ENTITY UPDATES ────────────────────────────────────────────────────────
function updateEntities(lv){
  for(let i=entities.length-1;i>=0;i--){
    const e=entities[i];
    if(!e.alive&&e.type!=='box'&&e.type!=='coin'&&e.type!=='flagpole'){
      if(e.stompTimer>0){e.stompTimer--;continue;}
      else{entities.splice(i,1);continue;}
    }
    switch(e.type){
      case'goomba':case'spiny': updateWalker(e,lv);break;
      case'cheep':  updateCheep(e,lv);break;
      case'box':    updateBox(e,lv);break;
      case'coin':   updateCoin(e,lv);break;
      case'mushroom': updateMushroom(e,lv);break;
      case'fireflower':updateFireFlower(e,lv);break;
      case'fireball':  updateFireball(e,lv);break;
      case'heart':     updateHeart(e,lv);break;
      case'boss':   if(e.alive)updateBoss(e,lv);break;
      case'paper':  updatePaper(e,lv);break;
      case'flagpole':  checkFlagpole(e,lv);break;
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function updateWalker(e,lv){
  if(!e.alive){e.stompTimer--;return;}
  e.vy+=GRAVITY;e.vy=Math.min(e.vy,14);
  // Wall + edge detection
  const aheadX=e.x+(e.vx>0?e.w+1:-1);
  const wallTX=Math.floor(aheadX/T),wallTY=Math.floor((e.y+e.h/2)/T);
  const footTX=Math.floor(aheadX/T),footTY=Math.floor((e.y+e.h+2)/T);
  if(isSolid(getTile(lv,wallTX,wallTY)))e.vx*=-1;
  else if(e.onGround&&!isSolid(getTile(lv,footTX,footTY)))e.vx*=-1;
  moveEntity(e,lv);
  e.animTimer++;if(e.animTimer>12){e.animTimer=0;e.animFrame=(e.animFrame+1)%2;}
  if(!player||player.dead||player.invuln>0)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    if(player.vy>0&&player.y+player.h<=e.y+10){
      if(e.stompable){stompEnemy(e);}
      else{player.vy=-5;killPlayer(lv);}
    } else {
      if(e.graceFrames>0){e.graceFrames--;return;}
      if(STATE.starTimer>0||STATE.powerup===5)stompEnemy(e);
      else killPlayer(lv);
    }
  }
  if(e.graceFrames>0)e.graceFrames--;
}

function stompEnemy(e){
  e.alive=false;e.stompTimer=20;e.vy=0;
  player.vy=-7;
  STATE.score+=100;
  Audio.stomp();
  spawnParticles(e.x+e.w/2,e.y,C.SLATE,5);
  if(coachmark&&coachmark.enemy_trigger){coachmark.dismissed=true;coachmark.visible=false;}
  emitEvent('threat.hit',{type:e.type,method:'stomp'});
}

function updateCheep(e,lv){
  if(!e.alive)return;
  e.leapTimer--;
  if(e.inWater){
    e.y=e.waterY+Math.sin(STATE.frame*0.05)*6;
    if(e.leapTimer<=0){e.inWater=false;e.vy=-9;e.leapTimer=80+(Math.random()*40)|0;}
  } else {
    e.vy+=GRAVITY;e.y+=e.vy;e.x+=e.vx;
    if(e.y>e.waterY+T){e.inWater=true;e.vy=0;}
    if(!player||player.dead||player.invuln>0)return;
    if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
      if(player.vy>0&&player.y+player.h<=e.y+10)stompEnemy(e);
      else if(STATE.starTimer>0)stompEnemy(e);
      else killPlayer(lv);
    }
  }
}

function updateBox(e,lv){
  if(e.animPhase===0){
    e.glowIntensity=0.5+0.5*Math.sin(STATE.frame*0.08);
    if(!player||player.dead)return;
    // Check player bumps box from below
    if(!e.hit&&rectRect(player.x,player.y,player.w,2,e.x,e.y+e.h-3,e.w,5)&&player.vy<0){
      hitBox(e,lv);
    }
  } else if(e.animPhase===1){
    e.animTimer++;e.rotation=Math.sin(e.animTimer*0.5)*0.3;
    if(e.animTimer>20){e.animPhase=2;e.animTimer=0;}
  } else if(e.animPhase===2){
    e.animTimer++;
    if(e.animTimer>24){
      if(e.quiz&&QUIZZES[e.quiz])showQuiz(e);
      else{deliverBoxReward(e,lv);e.animPhase=3;}
    }
  }
}

function hitBox(e,lv){
  e.hit=true;e.animPhase=1;e.animTimer=0;
  Audio.powerup(0);
  player.vy=Math.max(player.vy,0);
}

function showQuiz(e){
  STATE.quizActive={
    quiz:QUIZZES[e.quiz],boxEntity:e,
    answered:false,selected:-1,result:null,
    wrongAnim:0,timeout:360
  };
  STATE.screen='quiz';
  emitEvent('quiz.shown',{quizId:e.quiz});
  const el=document.getElementById('aria-live');
  if(el)el.textContent=QUIZZES[e.quiz].q+'. Options: '+QUIZZES[e.quiz].opts.join(', ');
}

function deliverBoxReward(e,lv){
  if(!e.reward)return;
  if(e.reward==='mushroom')entities.push(makeMushroom(e.x,e.y));
  else if(e.reward==='fireflower')entities.push(makeFireFlower(e.x,e.y));
  else if(e.reward==='heart')entities.push(makeHeart(e.x+T/2,e.y));
  else if(e.reward&&e.reward.startsWith('coins')){
    const n=parseInt(e.reward.replace('coins',''))||5;
    for(let c=0;c<n;c++)
      particles.push(makeParticle(e.x+T/2,e.y,C.COIN,(Math.random()-0.5)*4,-5-Math.random()*3,40));
    STATE.coins+=n;STATE.score+=n*10;Audio.coin();
  }
}

function updateCoin(e,lv){
  if(e.collected)return;
  e.spinAngle+=0.1;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;STATE.coins++;STATE.score+=50;
    Audio.coin();spawnParticles(e.x+5,e.y,C.COIN,4);
    emitEvent('coin.collected',{});
  }
}

function updateMushroom(e,lv){
  if(e.collected)return;
  if(e.emerging){e.y-=0.6;if(e.y<=e.targetY){e.emerging=false;e.vx=1.4;}return;}
  e.vy+=GRAVITY;moveEntity(e,lv);
  if(e.onGround&&e.vx===0)e.vx=1.4;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;
    STATE.powerup=Math.min(STATE.powerup+1,5);
    Audio.powerup(STATE.powerup);
    spawnParticles(e.x+14,e.y,C.AMBER,8);
    emitEvent('power_up.collected',{type:'mushroom',tier:STATE.powerup});
  }
}

function updateFireFlower(e,lv){
  if(e.collected)return;
  if(e.emerging){e.y-=0.6;if(e.y<=e.targetY)e.emerging=false;return;}
  e.bobPhase+=0.08;e.y+=Math.sin(e.bobPhase)*0.35;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;
    STATE.powerup=Math.max(STATE.powerup,2);
    Audio.powerup(2);
    spawnParticles(e.x+12,e.y,C.EMERALD,10);
    emitEvent('power_up.collected',{type:'fireflower',tier:2});
  }
}

function updateFireball(e,lv){
  if(!e.alive)return;
  e.vy+=GRAVITY*0.5;e.x+=e.vx;e.y+=e.vy;
  const tx=Math.floor((e.x+5)/T),ty=Math.floor((e.y+8)/T);
  if(isSolid(getTile(lv,tx,ty))){
    if(e.vy>0){e.vy*=-0.6;e.bounces++;}else e.alive=false;
  }
  if(isSolid(getTile(lv,Math.floor(e.x/T),Math.floor(e.y/T))))e.alive=false;
  if(e.bounces>3)e.alive=false;
  if(e.x<camera.x-T*2||e.x>camera.x+820)e.alive=false;
  for(const en of entities){
    if(!en.alive)continue;
    if(!['goomba','spiny','cheep','boss'].includes(en.type))continue;
    if(rectRect(e.x,e.y,e.w,e.h,en.x,en.y,en.w,en.h)){
      if(en.type==='boss'){
        en.hp-=1;Audio.bossHit();
        spawnParticles(en.x+28,en.y+36,C.CYAN,5);
        if(en.hp<=0)bossDied(en);
      } else {
        en.fireHitCount=(en.fireHitCount||0)+1;
        if(en.fireHitCount>=en.fireHits){
          en.alive=false;en.stompTimer=15;STATE.score+=150;
          spawnParticles(en.x+en.w/2,en.y,C.AMBER,7);
          emitEvent('threat.hit',{type:en.type,method:'fireball'});
        }
      }
      e.alive=false;Audio.stomp();break;
    }
  }
}

function updateHeart(e,lv){
  if(e.collected)return;
  e.vy+=GRAVITY*0.3;e.x+=e.vx;e.y+=e.vy;e.age++;
  if(e.age>200)e.collected=true;
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.collected=true;STATE.lives++;Audio.powerup(4);
    spawnParticles(e.x+T/2,e.y,C.RED,8);
    emitEvent('lives.changed',{lives:STATE.lives});
    emitEvent('power_up.collected',{type:'heart'});
  }
}

function updateBoss(e,lv){
  if(!e.alive)return;
  // Knowledge gate at 50% HP
  if(!e.knowledgeGateShown&&e.hp<=e.maxHp/2){
    e.knowledgeGateShown=true;
    STATE.quizActive={
      quiz:QUIZZES['cred_stuffing'],
      boxEntity:{...e,_bossGate:true},
      answered:false,selected:-1,result:null,
      wrongAnim:0,timeout:360
    };
    STATE.screen='quiz';
    BGM.start('boss');
    e.stunTimer=180;
    return;
  }
  if(e.stunTimer>0){e.stunTimer--;return;}

  e.vy+=GRAVITY;
  e.x+=e.vx;
  if(e.x<camera.x+50){e.vx=Math.abs(e.vx);}
  if(e.x>camera.x+650){e.vx=-Math.abs(e.vx);}
  moveEntity(e,lv);

  // Throw papers
  e.throwTimer--;
  if(e.throwTimer<=0){
    e.throwTimer=e.phase===2?28:55;
    const highArc=(entities.filter(x=>x.type==='paper').length%2)===0;
    entities.push({
      type:'paper',x:e.x+e.w/2,y:e.y+20,
      vx:(player&&!player.dead)?(player.x>e.x?2.2:-2.2):2.2,
      vy:highArc?-7:-3,
      alive:true,w:10,h:10,animAngle:0
    });
  }

  if(!player||player.dead||player.invuln>0)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    if(player.vy>0&&player.y+player.h<=e.y+18){
      e.hp-=(STATE.powerup>=2)?2:1;
      player.vy=-8;Audio.bossHit();
      spawnParticles(e.x+28,e.y,C.SLATE,6);
      e.stunTimer=15;
      if(e.hp<=0)bossDied(e);
    } else if(STATE.starTimer>0||STATE.powerup===5){
      e.hp-=2;if(e.hp<=0)bossDied(e);
    } else {
      killPlayer(lv);
    }
  }
  e.animTimer++;if(e.animTimer>8){e.animTimer=0;e.animFrame=(e.animFrame+1)%2;}
}

function bossDied(e){
  e.alive=false;
  Audio.levelComplete();
  spawnParticles(e.x+28,e.y+36,C.CYAN,20);
  spawnParticles(e.x+28,e.y+36,C.AMBER,20);
  STATE.score+=2000;
  emitEvent('threat.hit',{type:'boss',method:'defeated'});
  setTimeout(()=>{
    STATE.screen='levelcomplete';
    emitEvent('wave.completed',{world:STATE.world,level:STATE.level,score:STATE.score});
  },1600);
}

function updatePaper(e,lv){
  if(!e.alive)return;
  e.vy+=GRAVITY;e.x+=e.vx;e.y+=e.vy;e.animAngle+=0.12;
  if(e.y>lv.h*T){e.alive=false;return;}
  if(!player||player.dead||player.invuln>0)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    e.alive=false;killPlayer(lv);
  }
}

function checkFlagpole(e,lv){
  if(!player||player.dead)return;
  if(rectRect(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
    Audio.levelComplete();
    STATE.score+=500;
    emitEvent('wave.completed',{world:STATE.world,level:STATE.level,score:STATE.score});
    setTimeout(()=>{STATE.screen='levelcomplete';},900);
  }
}

// ─── QUIZ HANDLING ─────────────────────────────────────────────────────────
function handleQuizAnswer(idx){
  if(!STATE.quizActive||STATE.quizActive.answered)return;
  STATE.quizActive.answered=true;
  STATE.quizActive.selected=idx;
  const q=STATE.quizActive.quiz;
  const correct=idx===q.correct;
  STATE.quizActive.result=correct?'correct':'wrong';
  emitEvent('quiz.answered',{correct,answer:idx});

  const el=document.getElementById('aria-live');
  if(el)el.textContent=correct?'Correct! '+q.explain:'Incorrect. '+q.explain;

  if(correct){
    Audio.quizCorrect();
    const be=STATE.quizActive.boxEntity;
    if(be){
      if(be._bossGate){
        // Boss knowledge gate passed — boss stays stunned
        const boss=entities.find(x=>x.type==='boss'&&x.alive);
        if(boss){boss.stunTimer=180;boss.knowledgeGatePassed=true;}
      } else {
        deliverBoxReward(be,STATE.currentLevel);
        be.animPhase=3;be.hit=true;
      }
    }
  } else {
    Audio.quizWrong();
    STATE.quizActive.wrongAnim=90;
    const be=STATE.quizActive.boxEntity;
    if(be){
      if(be._bossGate){
        // Wrong boss gate — boss heals to full, enters phase 2
        const boss=entities.find(x=>x.type==='boss'&&x.alive);
        if(boss){boss.hp=boss.maxHp;boss.phase=2;boss.knowledgeGateShown=false;}
      } else {
        be.hit=false;be.animPhase=0;be.animTimer=0;
      }
    }
  }
}

function dismissQuiz(){
  STATE.screen='game';
  STATE.quizActive=null;
  const el=document.getElementById('aria-live');
  if(el)el.textContent='';
  document.getElementById('gameCanvas').focus();
}

// ─── CANVAS + CTX ────────────────────────────────────────────────────────────
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

function cls(){ctx.fillStyle=C.BG;ctx.fillRect(0,0,canvas.width,canvas.height);}

// ─── TILE DRAWING ────────────────────────────────────────────────────────────
function drawTile(tile,sx,sy){
  switch(tile){
    case 1: // Ground
      ctx.fillStyle=C.GROUND;ctx.fillRect(sx,sy,T,T);
      ctx.fillStyle='#2d5f8a';ctx.fillRect(sx,sy,T,2);ctx.fillRect(sx,sy,2,T);
      // Grid detail
      ctx.fillStyle='rgba(45,95,138,0.3)';
      if(T>=32){
        ctx.fillRect(sx+T/2,sy,1,T);ctx.fillRect(sx,sy+T/2,T,1);
      }
      break;
    case 2: // Platform
      ctx.fillStyle=C.PLATFORM;ctx.fillRect(sx,sy,T,T);
      ctx.fillStyle=C.CYAN_DIM;ctx.fillRect(sx,sy,T,4);
      break;
    case 3: // Brick
      ctx.fillStyle='#1a3a5c';ctx.fillRect(sx,sy,T,T);
      ctx.strokeStyle='#0e7490';ctx.lineWidth=1;
      ctx.strokeRect(sx+0.5,sy+0.5,T-1,T-1);
      ctx.fillStyle='#0e7490';
      ctx.fillRect(sx+T/2,sy,1,T);ctx.fillRect(sx,sy+T/2,T,1);
      break;
    case 5: // Pipe body
      ctx.fillStyle='#0d4a2a';ctx.fillRect(sx,sy,T,T);
      ctx.fillStyle='#10b981';ctx.fillRect(sx+2,sy,T-4,T);
      ctx.fillStyle='#065f3c';ctx.fillRect(sx,sy,4,T);
      break;
    case 6: // Pipe top
      ctx.fillStyle='#10b981';ctx.fillRect(sx-3,sy,T+6,T);
      ctx.fillStyle='#065f3c';ctx.fillRect(sx-3,sy,4,T);
      break;
    case 7: // Water
      ctx.fillStyle=`rgba(14,116,144,${0.5+0.15*Math.sin(STATE.frame*0.05)})`;
      ctx.fillRect(sx,sy,T,T);
      ctx.fillStyle='rgba(34,211,238,0.18)';ctx.fillRect(sx,sy,T,3);
      break;
    case 8: // Castle wall
      ctx.fillStyle='#1e293b';ctx.fillRect(sx,sy,T,T);
      ctx.strokeStyle='#334155';ctx.lineWidth=1;
      ctx.strokeRect(sx+0.5,sy+0.5,T-1,T-1);
      break;
    case 9: // Lava
      ctx.fillStyle=`rgb(${180+40*Math.sin(STATE.frame*0.08)},30,10)`;
      ctx.fillRect(sx,sy,T,T);
      ctx.fillStyle=`rgba(239,68,68,${0.4+0.3*Math.sin(STATE.frame*0.12)})`;
      ctx.fillRect(sx,sy,T,4);
      break;
  }
}

function drawLevel(lv){
  const startX=Math.max(0,Math.floor(camera.x/T)-1);
  const endX=Math.min(lv.w,startX+28);
  for(let ty=0;ty<lv.h;ty++){
    for(let tx=startX;tx<endX;tx++){
      const tile=lv.tiles[ty][tx];
      if(tile===0||tile===4)continue;
      drawTile(tile,tx*T-camera.x,ty*T);
    }
  }
}

function drawParallax(){
  if(STATE.reducedMotion)return;
  ctx.fillStyle='rgba(14,116,144,0.055)';
  const off=(camera.x*0.3)%48;
  for(let x=-48;x<canvas.width+48;x+=48)
    for(let y=0;y<canvas.height;y+=48)
      ctx.fillRect(x-off+1,y+1,1,1);
}

// ─── ENTITY DRAWING ──────────────────────────────────────────────────────────
function drawPlayer(){
  if(!player)return;
  const p=player;
  const sx=p.x-camera.x;
  if(p.dead){
    ctx.save();ctx.translate(sx+p.w/2,p.y+p.h/2);
    ctx.rotate(STATE.frame*0.18);
    drawPlayerShape(-p.w/2,-p.h/2,true);
    ctx.restore();return;
  }
  if(p.invuln>0&&Math.floor(p.invuln/4)%2===1)return;
  ctx.save();
  ctx.translate(sx+p.w/2,p.y+p.h/2);
  if(p.facing<0)ctx.scale(-1,1);
  drawPlayerShape(-p.w/2,-p.h/2,false);
  ctx.restore();
}

function drawPlayerShape(ox,oy,small){
  const tier=STATE.powerup;
  const h=small?18:PH,w=PW;

  // Star/rainbow body
  let bodyCol=C.CYAN,legCol=C.CYAN_DIM;
  if(tier>=4&&STATE.starTimer>0)bodyCol=`hsl(${(STATE.frame*6)%360},100%,60%)`;

  // Flame aura
  if(tier>=2&&!small){
    const pulse=0.4+0.25*Math.sin(STATE.frame*0.12);
    ctx.fillStyle=`rgba(251,191,36,${pulse})`;
    ctx.fillRect(ox-5,oy-5,w+10,h+10);
    for(let i=0;i<4;i++){
      const a=STATE.frame*0.15+i*Math.PI/2;
      ctx.fillStyle=`rgba(251,191,36,${0.55+0.3*Math.sin(STATE.frame*0.2+i)})`;
      ctx.beginPath();ctx.arc(ox+w/2+Math.cos(a)*10,oy+h/2+Math.sin(a)*5,3,0,Math.PI*2);ctx.fill();
    }
  }
  // Cape
  if(tier>=3&&!small){
    ctx.fillStyle='#7c3aed';
    ctx.beginPath();
    ctx.moveTo(ox,oy+6);ctx.lineTo(ox-10,oy+h*0.8);ctx.lineTo(ox,oy+h*0.65);ctx.fill();
  }
  // Body
  ctx.fillStyle=bodyCol;
  ctx.fillRect(ox,oy,w,h*0.62);
  // Head
  ctx.fillStyle=C.WHITE;
  ctx.fillRect(ox+1,oy-10,w-2,10);
  // Eye
  ctx.fillStyle=C.BG;ctx.fillRect(ox+w-7,oy-8,4,4);
  // Amber band (strong/flame)
  if(tier>=1){ctx.fillStyle=C.AMBER;ctx.fillRect(ox,oy+5,w,4);}
  // Flame headdress
  if(tier>=2&&!small){
    ctx.fillStyle='#f97316';ctx.fillRect(ox+1,oy-13,w-2,4);
    for(let i=0;i<3;i++){ctx.fillStyle=C.AMBER;ctx.beginPath();ctx.arc(ox+4+i*6,oy-14,2,0,Math.PI*2);ctx.fill();}
  }
  // Crown
  if(tier>=5&&!small){
    ctx.fillStyle=C.AMBER;
    ctx.beginPath();ctx.moveTo(ox,oy-14);ctx.lineTo(ox+w/2,oy-22);ctx.lineTo(ox+w,oy-14);
    ctx.lineTo(ox+w-2,oy-12);ctx.lineTo(ox+2,oy-12);ctx.closePath();ctx.fill();
  }
  // Legs
  ctx.fillStyle=legCol;
  ctx.fillRect(ox+2,oy+h-10,w*0.38,10);
  ctx.fillRect(ox+w*0.58,oy+h-10,w*0.38,10);
}

function drawEntities(lv){
  for(const e of entities){
    const sx=e.x-camera.x;
    if(sx<-80||sx>canvas.width+80)continue;
    switch(e.type){
      case'goomba': drawGoomba(e,sx);break;
      case'spiny':  drawSpiny(e,sx);break;
      case'cheep':  drawCheep(e,sx);break;
      case'box':    drawBox(e,sx);break;
      case'coin':   if(!e.collected)drawCoin(e,sx);break;
      case'mushroom':if(!e.collected)drawMushroom(e,sx);break;
      case'fireflower':if(!e.collected)drawFireFlower(e,sx);break;
      case'fireball':if(e.alive)drawFireball(e,sx);break;
      case'heart':  if(!e.collected)drawHeart(e,sx);break;
      case'boss':   if(e.alive)drawBoss(e,sx);break;
      case'paper':  if(e.alive)drawPaper(e,sx);break;
      case'flagpole':drawFlagpole(e,sx,lv);break;
    }
  }
}

function drawGoomba(e,sx){
  if(!e.alive){
    ctx.fillStyle=C.SLATE;ctx.fillRect(sx,e.y+e.h-5,e.w,5);return;
  }
  const bob=Math.sin(e.animFrame*0.5)*1.5;
  ctx.fillStyle=C.SLATE;ctx.fillRect(sx,e.y+bob,e.w,e.h);
  // Eyes
  ctx.fillStyle=C.RED;ctx.fillRect(sx+3,e.y+4+bob,5,5);ctx.fillRect(sx+e.w-8,e.y+4+bob,5,5);
  ctx.fillStyle=C.BG;ctx.fillRect(sx+4,e.y+5+bob,2,2);ctx.fillRect(sx+e.w-7,e.y+5+bob,2,2);
  // Password123 stripe
  ctx.fillStyle=C.AMBER;ctx.fillRect(sx,e.y+e.h-5+bob,e.w,4);
  // Feet
  ctx.fillStyle='#475569';
  const step=e.animFrame%2===0;
  ctx.fillRect(sx+(step?0:3),e.y+e.h-1+bob,8,3);
  ctx.fillRect(sx+e.w-10+(step?3:0),e.y+e.h-1+bob,8,3);
}

function drawSpiny(e,sx){
  if(!e.alive){ctx.fillStyle=C.RED;ctx.fillRect(sx,e.y+e.h-4,e.w,4);return;}
  ctx.fillStyle=C.RED;ctx.fillRect(sx,e.y,e.w,e.h);
  // Spikes
  ctx.fillStyle='#fca5a5';
  for(let i=0;i<4;i++)ctx.fillRect(sx+2+i*6,e.y-5,3,6);
  ctx.fillStyle=C.BG;ctx.fillRect(sx+3,e.y+4,4,4);ctx.fillRect(sx+e.w-7,e.y+4,4,4);
}

function drawCheep(e,sx){
  if(!e.alive)return;
  ctx.fillStyle=C.CYAN_DIM;ctx.fillRect(sx,e.y,e.w,e.h);
  ctx.fillStyle=C.RED;ctx.fillRect(sx+e.w-7,e.y+3,6,6);
  ctx.fillStyle=C.BG;ctx.fillRect(sx+e.w-6,e.y+4,3,3);
  // Tail
  ctx.fillStyle=C.CYAN_DIM;
  ctx.beginPath();ctx.moveTo(sx-2,e.y+2);ctx.lineTo(sx-8,e.y+e.h/2);ctx.lineTo(sx-2,e.y+e.h-2);ctx.fill();
}

function drawBox(e,sx){
  if(e.animPhase===3){
    ctx.fillStyle='#1e293b';ctx.fillRect(sx,e.y,T,T);
    ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.strokeRect(sx+0.5,e.y+0.5,T-1,T-1);
    return;
  }
  if(!STATE.reducedMotion){ctx.shadowColor=C.AMBER;ctx.shadowBlur=8*e.glowIntensity;}
  ctx.fillStyle=C.BG;ctx.fillRect(sx,e.y,T,T);
  ctx.strokeStyle=C.CYAN;ctx.lineWidth=2;ctx.strokeRect(sx+0.5,e.y+0.5,T-1,T-1);
  ctx.save();
  ctx.translate(sx+T/2,e.y+T/2);ctx.rotate(e.rotation||0);
  ctx.fillStyle=e.animPhase===1?C.WHITE:C.AMBER;
  ctx.font='bold 14px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('?',0,1);
  ctx.restore();ctx.shadowBlur=0;
}

function drawCoin(e,sx){
  // Round amber coin (ellipse)
  const scaleX=Math.abs(Math.cos(e.spinAngle));
  ctx.save();
  if(!STATE.reducedMotion){ctx.shadowColor=C.AMBER;ctx.shadowBlur=5;}
  ctx.fillStyle=C.COIN;
  ctx.beginPath();
  ctx.ellipse(sx+5,e.y+7,Math.max(1.5,5*scaleX),7,0,0,Math.PI*2);
  ctx.fill();
  // Shine
  if(scaleX>0.5){
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.beginPath();ctx.ellipse(sx+3,e.y+4,Math.max(0.5,2*scaleX),2.5,0,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;ctx.restore();
}

function drawMushroom(e,sx){
  ctx.fillStyle=C.AMBER;
  ctx.fillRect(sx+2,e.y+e.h*0.5,e.w-4,e.h*0.5);
  ctx.beginPath();ctx.arc(sx+e.w/2,e.y+e.h*0.4,e.w/2+2,Math.PI,0);ctx.fill();
  ctx.fillStyle=C.WHITE;ctx.fillRect(sx+4,e.y+e.h*0.5,e.w-8,e.h*0.5);
  ctx.fillStyle=C.BG;ctx.fillRect(sx+10,e.y+e.h*0.6,3,3);ctx.fillRect(sx+16,e.y+e.h*0.6,3,3);
}

function drawFireFlower(e,sx){
  ctx.fillStyle=C.EMERALD;ctx.fillRect(sx+e.w/2-1,e.y+e.h*0.5,3,e.h*0.5);
  for(let i=0;i<4;i++){
    const a=(i/4)*Math.PI*2+e.bobPhase;
    ctx.fillStyle=i%2===0?C.RED:C.AMBER;
    ctx.beginPath();ctx.arc(sx+e.w/2+Math.cos(a)*7,e.y+e.h*0.3+Math.sin(a)*7,4,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle=C.EMERALD;ctx.beginPath();ctx.arc(sx+e.w/2,e.y+e.h*0.3,4,0,Math.PI*2);ctx.fill();
}

function drawFireball(e,sx){
  ctx.fillStyle=C.RED;ctx.beginPath();ctx.arc(sx+5,e.y+5,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.AMBER;ctx.beginPath();ctx.arc(sx+5,e.y+5,2.5,0,Math.PI*2);ctx.fill();
}

function drawHeart(e,sx){
  ctx.fillStyle=C.RED;
  ctx.font='18px serif';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('♥',sx,e.y);
}

function drawBoss(e,sx){
  const bob=Math.sin(e.animFrame*0.5)*2;
  const stunned=e.stunTimer>0;
  ctx.fillStyle=stunned?'#64748b':C.BOSS;
  ctx.fillRect(sx,e.y+bob,e.w,e.h);
  // Eyes
  ctx.fillStyle=stunned?C.SLATE:C.RED;
  ctx.fillRect(sx+8,e.y+14+bob,10,10);ctx.fillRect(sx+e.w-18,e.y+14+bob,10,10);
  ctx.fillStyle=C.BG;ctx.fillRect(sx+10,e.y+16+bob,5,5);ctx.fillRect(sx+e.w-16,e.y+16+bob,5,5);
  // Label
  ctx.fillStyle=C.AMBER;ctx.font='bold 8px Inter';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Password123',sx+e.w/2,e.y+e.h-14+bob);
  // HP bar
  ctx.fillStyle='#334155';ctx.fillRect(sx,e.y-12,e.w,6);
  ctx.fillStyle=e.hp>e.maxHp/2?C.EMERALD:C.RED;
  ctx.fillRect(sx,e.y-12,e.w*(e.hp/e.maxHp),6);
  // Phase indicator
  if(e.phase===2){
    ctx.fillStyle='rgba(239,68,68,0.3)';ctx.fillRect(sx-4,e.y+bob-4,e.w+8,e.h+8);
  }
}

function drawPaper(e,sx){
  ctx.save();ctx.translate(sx+5,e.y+5);ctx.rotate(e.animAngle);
  ctx.fillStyle=C.WHITE;ctx.fillRect(-5,-5,10,10);
  ctx.fillStyle=C.SLATE;for(let l=0;l<3;l++)ctx.fillRect(-3,-3+l*3,6,1);
  ctx.restore();
}

function drawFlagpole(e,sx,lv){
  // Pole
  ctx.fillStyle=C.SLATE;ctx.fillRect(sx+T/2-2,0,4,lv.h*T);
  // Flag
  ctx.fillStyle=C.CYAN;
  ctx.beginPath();ctx.moveTo(sx+T/2+2,10);ctx.lineTo(sx+T/2+20,18);ctx.lineTo(sx+T/2+2,26);ctx.fill();
  // Credential tier markers on pole
  const markerColors=[C.AMBER,C.EMERALD,C.CYAN];
  const labels=['PWD','MFA','KEY'];
  for(let i=0;i<3;i++){
    const my=50+i*80;
    ctx.fillStyle=markerColors[i];ctx.fillRect(sx+T/2-10,my,20,14);
    ctx.fillStyle=C.BG;ctx.font='bold 6px Inter';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(labels[i],sx+T/2,my+4);
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;
}

function drawCoachmark(){
  if(!coachmark||!coachmark.visible||coachmark.dismissed)return;
  const sx=coachmark.tx*T-camera.x;
  if(sx<-60||sx>canvas.width+60)return;
  ctx.fillStyle='rgba(251,191,36,0.95)';ctx.font='bold 10px Inter';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  const w=ctx.measureText(coachmark.text).width+14;
  ctx.fillRect(sx-w/2,coachmark.ty*T-22,w,18);
  ctx.fillStyle=C.BG;ctx.fillText(coachmark.text,sx,coachmark.ty*T-6);
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(2,6,23,0.82)';ctx.fillRect(0,0,canvas.width,32);
  // Lives

    ctx.fillStyle=i<STATE.lives?C.RED:'#1e293b';
    ctx.fillText('♥',8+i*18,16);
  }
  ctx.fillStyle=C.WHITE;ctx.font='10px Inter';
  ctx.fillText(`IQ ${STATE.score}`,10+3*18+4,16);
  // Centre: world + badge
  ctx.textAlign='center';
  ctx.fillStyle=C.WHITE;ctx.font='bold 11px Inter';
  ctx.fillText(`WORLD ${STATE.world}-${STATE.level===5?'CASTLE':STATE.level}`,canvas.width/2,10);
  const badges=['BASE','STRONG-PASSWORD','FLAME·UNIQUE-PW','CAPE·VAULT','STAR·INVULN','CROWN·MASTER'];
  const badgeCols=[C.SLATE,C.CYAN,C.AMBER,`#7c3aed`,'#f59e0b',C.AMBER];
  ctx.fillStyle=badgeCols[STATE.powerup]||C.SLATE;
  ctx.font='bold 9px Inter';ctx.fillText(badges[STATE.powerup]||'BASE',canvas.width/2,24);
  // Top-right: coins + score
  ctx.textAlign='right';
  ctx.fillStyle=C.AMBER;ctx.font='bold 15px Inter';ctx.fillText(`⬡ ${STATE.coins}`,canvas.width-8,13);
  ctx.fillStyle=C.WHITE;ctx.font='11px Inter';ctx.fillText(`${STATE.score}`,canvas.width-8,26);
  // Mute
  ctx.fillStyle='rgba(148,163,184,0.65)';ctx.font='11px Inter';ctx.textAlign='left';
  ctx.fillText(Audio.isMuted()?'🔇':'🔊',canvas.width-50,26);
}

// ─── QUIZ OVERLAY ─────────────────────────────────────────────────────────────
function drawQuizOverlay(){
  if(!STATE.quizActive)return;
  const q=STATE.quizActive,qd=q.quiz;
  ctx.fillStyle='rgba(2,6,23,0.88)';ctx.fillRect(0,0,canvas.width,canvas.height);

  const CX=50,CY=55,CW=700,CH=370;
  ctx.fillStyle='#0f172a';ctx.fillRect(CX,CY,CW,CH);
  ctx.strokeStyle=C.CYAN;ctx.lineWidth=2;ctx.strokeRect(CX,CY,CW,CH);
  // Corner accents
  ctx.fillStyle=C.AMBER;
  [[CX,CY],[CX+CW-10,CY],[CX,CY+CH-10],[CX+CW-10,CY+CH-10]].forEach(([x,y])=>ctx.fillRect(x,y,10,10));

  if(q.wrongAnim>0){
    ctx.fillStyle=`rgba(239,68,68,${0.14*(q.wrongAnim/90)})`;ctx.fillRect(CX,CY,CW,CH);
  }

  // Header
  ctx.fillStyle=C.AMBER;ctx.font='bold 11px Inter';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('? CREDENTIAL CHECK',CX+CW/2,CY+12);

  // Question (wrapped)
  ctx.fillStyle=C.WHITE;ctx.font='bold 15px Inter';
  const lines=wrapText(qd.q,CW-50);
  lines.forEach((l,i)=>ctx.fillText(l,CX+CW/2,CY+32+i*20));

  const optY=CY+32+lines.length*20+14;

  if(!q.answered){
    // Options
    qd.opts.forEach((opt,i)=>{
      const by=optY+i*56;
      ctx.fillStyle=i===q.selected?C.CYAN_DIM:'#1e293b';
      ctx.fillRect(CX+20,by,CW-40,46);
      ctx.strokeStyle=i===q.selected?C.CYAN:'#334155';ctx.lineWidth=1;
      ctx.strokeRect(CX+20,by,CW-40,46);
      // Number badge
      ctx.fillStyle=C.AMBER;ctx.fillRect(CX+20,by,32,46);
      ctx.fillStyle=C.BG;ctx.font='bold 13px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(String(i+1),CX+36,by+23);
      ctx.fillStyle=C.WHITE;ctx.font='14px Inter';ctx.textAlign='left';
      ctx.fillText(opt,CX+62,by+23);
    });
    // Timeout bar
    const pct=q.timeout/360;
    ctx.fillStyle='#1e293b';ctx.fillRect(CX+20,CY+CH-22,CW-40,8);
    ctx.fillStyle=pct>0.5?C.EMERALD:pct>0.25?C.AMBER:C.RED;
    ctx.fillRect(CX+20,CY+CH-22,(CW-40)*pct,8);
    ctx.fillStyle=C.SLATE;ctx.font='9px Inter';ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText('Press 1–4 to answer · timeout = no penalty',CX+CW-22,CY+CH-11);
  } else {
    // Feedback
    ctx.font='bold 20px Inter';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillStyle=q.result==='correct'?C.EMERALD:C.RED;
    ctx.fillText(q.result==='correct'?'✓ CORRECT!':'✗ NOT QUITE',CX+CW/2,optY);
    // Explain
    ctx.fillStyle=C.WHITE;ctx.font='13px Inter';
    const expLines=wrapText(qd.explain,CW-60);
    expLines.forEach((l,i)=>ctx.fillText(l,CX+CW/2,optY+32+i*18));
    // Continue button
    const BW=150,BH=40,BX=CX+(CW-BW)/2,BY=CY+CH-55;
    const pulse=0.7+0.3*Math.sin(STATE.frame*0.08);
    ctx.globalAlpha=pulse;ctx.fillStyle=C.CYAN;ctx.fillRect(BX,BY,BW,BH);ctx.globalAlpha=1;
    ctx.strokeStyle=C.WHITE;ctx.lineWidth=1;ctx.strokeRect(BX+0.5,BY+0.5,BW-1,BH-1);
    ctx.fillStyle=C.BG;ctx.font='bold 13px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Continue ▶',BX+BW/2,BY+BH/2);
    ctx.fillStyle=C.SLATE;ctx.font='9px Inter';ctx.textBaseline='top';
    ctx.fillText('CLICK  ·  SPACE  ·  ENTER',CX+CW/2,BY+BH+4);
    // Store click rect
    STATE._quizContinueRect={x:BX,y:BY,w:BW,h:BH};
  }
}

function wrapText(text,maxW){
  ctx.font='bold 15px Inter'; // measure font
  const words=text.split(' '),lines=[];let line='';
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w;}
    else line=test;
  }
  if(line)lines.push(line);
  return lines;
}

// ─── SCREEN RENDERERS ─────────────────────────────────────────────────────────
function drawTitle(){
  cls();
  if(!STATE.reducedMotion){
    ctx.strokeStyle='rgba(14,116,144,0.15)';ctx.lineWidth=1;
    const off=(STATE.frame*0.5)%40;
    for(let x=0;x<canvas.width;x+=40){ctx.beginPath();ctx.moveTo(x+off,0);ctx.lineTo(x+off,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height;y+=40){ctx.beginPath();ctx.moveTo(0,y+off);ctx.lineTo(canvas.width,y+off);ctx.stroke();}
  }
  const pulse=1+0.04*Math.sin(STATE.frame*0.06);
  ctx.save();ctx.translate(canvas.width/2,130);ctx.scale(pulse,pulse);
  ctx.fillStyle=C.CYAN;ctx.font='bold 40px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('CyberIQ',0,0);ctx.restore();
  ctx.fillStyle=C.WHITE;ctx.font='bold 28px Inter';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Credential Citadel',canvas.width/2,172);
  ctx.fillStyle=C.AMBER;ctx.font='bold 12px Inter';
  ctx.fillText('A PASSWORD SECURITY ADVENTURE',canvas.width/2,210);
  ctx.fillStyle=C.SLATE;ctx.font='11px Inter';
  ctx.fillText('5 worlds · 20 levels · credential hygiene through play',canvas.width/2,238);
  if(Math.floor(STATE.frame/30)%2===0){
    ctx.fillStyle=C.WHITE;ctx.font='bold 14px Inter';ctx.fillText('PRESS SPACE TO START',canvas.width/2,298);}
  ctx.fillStyle=C.SLATE;ctx.font='10px Inter';
  ctx.fillText('← → walk · SPACE jump · Z fireball · M mute · ESC pause',canvas.width/2,358);
  // Mini hero
  ctx.fillStyle=C.CYAN;ctx.fillRect(canvas.width/2-11,374,22,28);
  ctx.fillStyle=C.WHITE;ctx.fillRect(canvas.width/2-8,362,16,14);
}

    {n:'PASSWORD PLAINS',sub:'Basics of credential hygiene'},

    {n:'RECOVERY REALM',sub:'Account recovery'},
    {n:'IDENTITY CITADEL',sub:'Final challenge'},
  ];
  worlds.forEach((w,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const bx=40+col*240,by=72+row*170;
    const sel=i===STATE.worldSelectIndex;

    ctx.strokeStyle=sel?C.AMBER:C.CYAN_DIM;ctx.lineWidth=sel?2:1;ctx.strokeRect(bx+0.5,by+0.5,209,139);

function drawPauseMenu(){
  ctx.fillStyle='rgba(2,6,23,0.85)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=C.CYAN;ctx.font='bold 24px Inter';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('PAUSED',canvas.width/2,75);
  const items=['RESUME','RESTART LEVEL','TOGGLE MUTE','QUIT TO WORLD SELECT'];
  items.forEach((item,i)=>{
    const sel=i===STATE.pauseSelectedItem;
    ctx.fillStyle=sel?C.AMBER:C.SLATE;ctx.font=`bold ${sel?'16':'14'}px Inter`;
    ctx.fillText(item,canvas.width/2,150+i*52);
  });
  ctx.fillStyle=C.SLATE;ctx.font='11px Inter';ctx.fillText('↑↓ navigate · SPACE select · ESC resume',canvas.width/2,340);
}

function drawLevelComplete(){
  ctx.fillStyle='rgba(2,6,23,0.9)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=C.EMERALD;ctx.font='bold 32px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('LEVEL COMPLETE!',canvas.width/2,150);
  ctx.fillStyle=C.AMBER;ctx.font='20px Inter';ctx.fillText(`Score: ${STATE.score}`,canvas.width/2,210);
  ctx.fillStyle=C.WHITE;ctx.font='14px Inter';ctx.fillText(`Coins collected: ${STATE.coins}`,canvas.width/2,248);
  // Lesson recap
  const lv=STATE.currentLevel;
  if(lv&&!lv.scaffold){
    ctx.fillStyle=C.CYAN;ctx.font='12px Inter';
    ctx.fillText('Lesson: '+getLevelLesson(lv.id),canvas.width/2,286);
  }
  if(Math.floor(STATE.frame/30)%2===0){
    ctx.fillStyle=C.WHITE;ctx.font='bold 13px Inter';
    ctx.fillText('Press any key to continue →',canvas.width/2,330);}
}

function getLevelLesson(id){
  const m={'1-1':'Long passphrases beat short complex passwords',
    '1-2':'Unique passwords prevent credential stuffing',
    '1-3':'Brute force is stopped by length and complexity',
    '1-4':'Layer your defences — no single measure is enough',
    '1-C':'The Reuser is defeated! Password reuse is your enemy'};
  return m[id]||'Keep your credentials strong and unique';
}

function drawGameOver(){
  ctx.fillStyle='rgba(2,6,23,0.95)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=C.RED;ctx.font='bold 36px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('IDENTITY LOST',canvas.width/2,150);
  ctx.fillStyle=C.SLATE;ctx.font='14px Inter';ctx.fillText('Your credentials were compromised!',canvas.width/2,210);

  ctx.fillStyle=C.WHITE;ctx.font='bold 14px Inter';ctx.fillText('Press R to retry  ·  ESC for world select',canvas.width/2,306);
}

function drawVictory(){
  cls();
  const pulse=1+0.05*Math.sin(STATE.frame*0.07);
  ctx.save();ctx.translate(canvas.width/2,110);ctx.scale(pulse,pulse);
  ctx.fillStyle=C.AMBER;ctx.font='bold 30px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('CREDENTIALS SECURED!',0,0);ctx.restore();
  ctx.fillStyle=C.CYAN;ctx.font='18px Inter';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Master Breach-Broker Defeated',canvas.width/2,168);
  ctx.fillStyle=C.WHITE;ctx.font='13px Inter';
  ['✓ Use unique passwords for every site','✓ Enable MFA (hardware key is most secure)','✓ Use a password manager','✓ Apply least-privilege access','✓ Keep recovery codes offline']
    .forEach((l,i)=>ctx.fillText(l,canvas.width/2,220+i*28));
  ctx.fillStyle=C.AMBER;ctx.font='bold 14px Inter';
  ctx.fillText(`Final Score: ${STATE.score}`,canvas.width/2,380);
  if(Math.floor(STATE.frame/40)%2===0){
    ctx.fillStyle=C.SLATE;ctx.font='11px Inter';ctx.fillText('SPACE to play again',canvas.width/2,418);}
}

// ─── CLICK HANDLER ────────────────────────────────────────────────────────────
canvas.addEventListener('click',ev=>{
  // Title/gameover/levelcomplete — click to advance
  if(STATE.screen==='title'){Audio.init();BGM.setMuted(Audio.isMuted());STATE.screen='worldselect';return;}
  const rect=canvas.getBoundingClientRect();
  const mx=(ev.clientX-rect.left)*(canvas.width/rect.width);
  const my=(ev.clientY-rect.top)*(canvas.height/rect.height);

  if(STATE.screen==='quiz'&&STATE.quizActive){
    const q=STATE.quizActive,qd=q.quiz;
    if(q.answered&&STATE._quizContinueRect){
      const r=STATE._quizContinueRect;
      if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){dismissQuiz();return;}
    }
    if(!q.answered){
      // Click on options
      ctx.font='bold 15px Inter';
      const lines=wrapText(qd.q,700-50);
      const optY=55+32+lines.length*20+14;
      qd.opts.forEach((_,i)=>{
        const by=optY+i*56;
        if(mx>=50+20&&mx<=50+700-20&&my>=by&&my<=by+46)handleQuizAnswer(i);
      });
    }
  }
});

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function gameUpdate(){
  STATE.frame++;
  const scr=STATE.screen;

  if(scr==='title'){
    if(Keys.pressed('Space')){Audio.init();BGM.setMuted(Audio.isMuted());STATE.screen='worldselect';}
  } else if(scr==='worldselect'){
    if(Keys.pressed('ArrowLeft'))STATE.worldSelectIndex=Math.max(0,STATE.worldSelectIndex-1);
    if(Keys.pressed('ArrowRight'))STATE.worldSelectIndex=Math.min(5,STATE.worldSelectIndex+1);
    if(Keys.pressed('ArrowUp'))STATE.worldSelectIndex=Math.max(0,STATE.worldSelectIndex-3);
    if(Keys.pressed('ArrowDown'))STATE.worldSelectIndex=Math.min(5,STATE.worldSelectIndex+3);
    if(Keys.pressed('Space')||Keys.pressed('Enter')){
      const wi=STATE.worldSelectIndex;
      STATE.world=wi+1;STATE.level=1;
      STATE.lives=3;STATE.score=0;STATE.coins=0;STATE.powerup=0;
      loadLevel(STATE.world,STATE.level);
      emitEvent('session.started',{world:STATE.world});
    }
    if(Keys.pressed('Escape'))STATE.screen='title';
  } else if(scr==='game'){
    const lv=STATE.currentLevel;
    if(Keys.pressed('Escape')){STATE.screen='pause';STATE.pauseSelectedItem=0;}
    if(Keys.pressed('KeyM'))Audio.toggle();
    updatePlayer(lv);
    updateEntities(lv);
  } else if(scr==='quiz'){
    const q=STATE.quizActive;
    if(!q){STATE.screen='game';return;}
    for(let i=0;i<4;i++)if(Keys.pressed(`Digit${i+1}`))handleQuizAnswer(i);
    if(q.answered&&(Keys.pressed('Space')||Keys.pressed('Enter')||Keys.pressed('Escape')))dismissQuiz();
    if(!q.answered){
      q.timeout--;
      if(q.timeout<=0){
        if(q.boxEntity&&!q.boxEntity._bossGate){q.boxEntity.hit=false;q.boxEntity.animPhase=0;}
        dismissQuiz();
      }
    }
    if(q.wrongAnim>0)q.wrongAnim--;
  } else if(scr==='pause'){
    if(Keys.pressed('Escape'))STATE.screen='game';
    if(Keys.pressed('ArrowUp'))STATE.pauseSelectedItem=Math.max(0,STATE.pauseSelectedItem-1);
    if(Keys.pressed('ArrowDown'))STATE.pauseSelectedItem=Math.min(3,STATE.pauseSelectedItem+1);
    if(Keys.pressed('Space')||Keys.pressed('Enter')){
      if(STATE.pauseSelectedItem===0){STATE.screen='game';}
      else if(STATE.pauseSelectedItem===1){STATE.powerup=0;loadLevel(STATE.world,STATE.level);}
      else if(STATE.pauseSelectedItem===2){Audio.toggle();}
      else if(STATE.pauseSelectedItem===3){BGM.stop();STATE.screen='worldselect';}
    }
  } else if(scr==='levelcomplete'){
    if(Keys.just.size>0||STATE.frame%200===0){
      const lv=STATE.currentLevel;
      if(lv.hasBoss||lv.level===5){
        STATE.worldsUnlocked[STATE.world]=true;
        if(STATE.world>=5){STATE.screen='victory';emitEvent('session.completed',{score:STATE.score});}
        else{BGM.stop();STATE.screen='worldselect';}
      } else {
        STATE.level++;loadLevel(STATE.world,STATE.level);
      }
    }
  } else if(scr==='gameover'){
    if(Keys.pressed('KeyR')){STATE.lives=3;STATE.powerup=0;BGM.stop();loadLevel(STATE.world,STATE.level);}
    if(Keys.pressed('Escape')){BGM.stop();STATE.screen='worldselect';}
  } else if(scr==='victory'){
    if(Keys.pressed('Space')){
      STATE.world=1;STATE.level=1;STATE.lives=3;STATE.score=0;STATE.coins=0;STATE.powerup=0;
      BGM.stop();STATE.screen='worldselect';
      emitEvent('session.started',{world:1,restart:true});
    }
  }

  Keys.flush();
}

function gameDraw(){
  const scr=STATE.screen;
  if(scr==='title'){drawTitle();return;}
  if(scr==='worldselect'){drawWorldSelect();return;}
  if(scr==='gameover'){drawGameOver();return;}
  if(scr==='victory'){drawVictory();return;}

  // In-game screens
  if(STATE.currentLevel){
    const lv=STATE.currentLevel;
    cls();
    drawParallax();
    drawLevel(lv);
    drawEntities(lv);
    drawPlayer();
    drawParticles();
    drawCoachmark();
    drawHUD();
    if(scr==='quiz')drawQuizOverlay();
    if(scr==='pause')drawPauseMenu();
    if(scr==='levelcomplete')drawLevelComplete();
  } else {
    cls();
  }
}

function loop(){
  gameUpdate();
  gameDraw();
  requestAnimationFrame(loop);
}

// Boot
requestAnimationFrame(loop);
document.getElementById('gameCanvas').focus();
</script>
